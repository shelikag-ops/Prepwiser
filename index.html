<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Meal Prep Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --saffron: #E8820C;
    --saffron-light: #FFF3E0;
    --saffron-glow: rgba(232,130,12,0.12);
    --deep: #1A1208;
    --mid: #3D2B1A;
    --cream: #FDF8F2;
    --card-bg: #FFFDF9;
    --text: #2C1A0E;
    --muted: #8B6E52;
    --border: rgba(232,130,12,0.2);
    --green: #2D6A4F;
    --green-light: #E8F5EE;
    --comfort: #C0392B;
    --comfort-light: #FDEDEC;
    --eatout: #1565C0;
    --eatout-light: #E3F2FD;
    --step-done: #95A5A6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND TEXTURE ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(232,130,12,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 90%, rgba(232,130,12,0.04) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  /* ── HEADER ── */
  .header {
    background: var(--deep);
    padding: 0;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  .header-inner {
    max-width: 1100px; margin: 0 auto;
    padding: 14px 24px;
    display: flex; align-items: center; gap: 20px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-weight: 900; font-size: 22px;
    color: var(--saffron);
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }

  .logo span { color: #FDF8F2; font-weight: 400; }

  /* DAY TABS */
  .day-tabs {
    display: flex; gap: 4px; flex-wrap: wrap; flex: 1;
  }

  .day-tab {
    padding: 7px 16px; border-radius: 20px;
    border: 1.5px solid rgba(232,130,12,0.3);
    background: transparent;
    color: rgba(253,248,242,0.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .day-tab:hover { border-color: var(--saffron); color: var(--saffron); }
  .day-tab.active {
    background: var(--saffron); border-color: var(--saffron);
    color: white; font-weight: 600;
  }

  /* TIME TOGGLE */
  .time-toggle {
    display: flex; gap: 4px; margin-left: auto;
    flex-shrink: 0;
  }

  .time-btn {
    padding: 6px 14px; border-radius: 20px;
    border: 1.5px solid rgba(253,248,242,0.2);
    background: transparent;
    color: rgba(253,248,242,0.5);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }

  .time-btn.active {
    background: rgba(253,248,242,0.1);
    border-color: rgba(253,248,242,0.4);
    color: #FDF8F2;
  }

  /* ── MAIN LAYOUT ── */
  .main { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; position: relative; z-index: 1; }

  /* ── DAY HEADER ── */
  .day-title-bar {
    display: flex; align-items: baseline; gap: 16px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 2px solid var(--border);
  }

  .day-title {
    font-family: 'Playfair Display', serif;
    font-size: 38px; font-weight: 900;
    color: var(--saffron);
    line-height: 1;
  }

  .day-subtitle {
    font-size: 14px; color: var(--muted);
    font-weight: 400;
  }

  .progress-ring {
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--muted);
  }

  .progress-bar {
    width: 120px; height: 6px;
    background: var(--border);
    border-radius: 3px; overflow: hidden;
  }

  .progress-fill {
    height: 100%; background: var(--saffron);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  /* ── MEAL CARDS GRID ── */
  .meals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  /* ── MEAL CARD ── */
  .meal-card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: box-shadow 0.25s, transform 0.2s;
    display: flex; flex-direction: column;
  }

  .meal-card:hover {
    box-shadow: 0 8px 32px rgba(232,130,12,0.12);
    transform: translateY(-2px);
  }

  .meal-card.comfort { border-color: rgba(192,57,43,0.3); }
  .meal-card.eat-out { border-color: rgba(21,101,192,0.3); }

  /* Card header */
  .card-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, var(--saffron-glow), transparent);
    cursor: pointer;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }

  .meal-card.comfort .card-header { background: linear-gradient(135deg, rgba(192,57,43,0.06), transparent); }
  .meal-card.eat-out .card-header { background: linear-gradient(135deg, rgba(21,101,192,0.06), transparent); }

  .meal-time {
    font-size: 11px; font-weight: 600; letter-spacing: 0.8px;
    text-transform: uppercase; color: var(--saffron); margin-bottom: 4px;
  }

  .meal-card.comfort .meal-time { color: var(--comfort); }
  .meal-card.eat-out .meal-time { color: var(--eatout); }

  .meal-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px; font-weight: 700;
    color: var(--text); line-height: 1.3;
  }

  .card-chevron {
    font-size: 18px; color: var(--muted);
    transition: transform 0.25s; flex-shrink: 0;
    margin-top: 2px;
  }

  .meal-card.open .card-chevron { transform: rotate(180deg); }

  /* Card body */
  .card-body {
    display: none; flex-direction: column;
    flex: 1;
  }

  .meal-card.open .card-body { display: flex; }

  /* Tabs inside card */
  .card-tabs {
    display: flex; border-bottom: 1px solid var(--border);
    background: rgba(232,130,12,0.03);
  }

  .card-tab {
    flex: 1; padding: 9px 8px;
    font-size: 11px; font-weight: 600;
    text-align: center; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--muted);
    cursor: pointer; border: none; background: none;
    transition: all 0.2s;
    border-bottom: 2px solid transparent;
  }

  .card-tab.active {
    color: var(--saffron);
    border-bottom-color: var(--saffron);
    background: rgba(232,130,12,0.05);
  }

  .meal-card.comfort .card-tab.active { color: var(--comfort); border-bottom-color: var(--comfort); }
  .meal-card.eat-out .card-tab.active { color: var(--eatout); border-bottom-color: var(--eatout); }

  /* Tab panels */
  .tab-panel { display: none; padding: 16px 18px; flex: 1; }
  .tab-panel.active { display: block; }

  /* Dish description */
  .dish-desc {
    font-size: 14px; line-height: 1.65; color: var(--text);
    white-space: pre-line;
  }

  .dish-desc .macro-line {
    display: inline-block; margin-top: 8px;
    background: var(--saffron-light);
    color: var(--saffron); font-weight: 600;
    font-size: 12px; padding: 3px 10px; border-radius: 20px;
  }

  /* Kids banner */
  .kids-section {
    background: var(--green-light);
    border-left: 3px solid var(--green);
    padding: 10px 14px; border-radius: 0 8px 8px 0;
    font-size: 13px; line-height: 1.55;
    color: #1a3d2b;
  }

  .kids-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--green); margin-bottom: 4px;
  }

  /* Prep steps */
  .steps-list { list-style: none; }

  .step-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(232,130,12,0.08);
    cursor: pointer; transition: opacity 0.2s;
  }

  .step-item:last-child { border-bottom: none; }
  .step-item.done { opacity: 0.45; }

  .step-num {
    width: 26px; height: 26px; flex-shrink: 0;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    background: var(--saffron-light); color: var(--saffron);
    transition: all 0.2s;
    border: 1.5px solid rgba(232,130,12,0.3);
  }

  .step-item.done .step-num {
    background: #eee; color: var(--step-done);
    border-color: #ddd;
    font-size: 14px;
  }

  .step-text {
    font-size: 14px; line-height: 1.55; color: var(--text);
    flex: 1; padding-top: 3px;
    transition: color 0.2s;
  }

  .step-item.done .step-text { text-decoration: line-through; color: var(--step-done); }

  /* Timer badge */
  .timer-badge {
    font-size: 11px; font-weight: 600;
    background: rgba(232,130,12,0.1); color: var(--saffron);
    padding: 2px 8px; border-radius: 10px;
    flex-shrink: 0; margin-top: 5px;
    display: flex; align-items: center; gap: 3px;
  }

  .comfort .timer-badge { background: rgba(192,57,43,0.1); color: var(--comfort); }

  /* Empty state */
  .no-steps {
    color: var(--muted); font-size: 13px;
    font-style: italic; padding: 8px 0;
    text-align: center;
  }

  /* Recipe link */
  .recipe-link {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 14px;
    padding: 8px 14px; border-radius: 8px;
    background: var(--saffron-light);
    color: var(--saffron); text-decoration: none;
    font-size: 12px; font-weight: 600;
    transition: all 0.2s;
    border: 1px solid rgba(232,130,12,0.2);
  
  background: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  font-size: inherit;
  text-align: left;
  padding: 0;
}

  .recipe-link:hover { background: var(--saffron); color: white; }
  .meal-card.comfort .recipe-link { background: var(--comfort-light); color: var(--comfort); border-color: rgba(192,57,43,0.2); }
  .meal-card.comfort .recipe-link:hover { background: var(--comfort); color: white; }
  .meal-card.eat-out .recipe-link { background: var(--eatout-light); color: var(--eatout); border-color: rgba(21,101,192,0.2); }
  .meal-card.eat-out .recipe-link:hover { background: var(--eatout); color: white; }

  /* Special badges */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.3px; margin-bottom: 6px;
  }

  .badge-comfort { background: var(--comfort-light); color: var(--comfort); }
  .badge-eatout { background: var(--eatout-light); color: var(--eatout); }

  /* PREP SUMMARY BAR */
  .prep-summary {
    background: var(--deep); color: #FDF8F2;
    border-radius: 14px; padding: 20px 24px;
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 24px;
    flex-wrap: wrap;
  }

  .prep-label {
    font-family: 'Playfair Display', serif;
    font-size: 15px; font-weight: 700;
    color: var(--saffron);
  }

  .prep-stat {
    display: flex; flex-direction: column; align-items: center;
  }

  .prep-stat-num {
    font-size: 26px; font-weight: 700;
    color: white; line-height: 1;
  }

  .prep-stat-lbl {
    font-size: 11px; color: rgba(253,248,242,0.5);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-top: 2px;
  }

  .prep-divider { width: 1px; height: 36px; background: rgba(253,248,242,0.1); }

  /* QUICK CLEAR */
  .clear-btn {
    margin-left: auto;
    padding: 8px 18px; border-radius: 20px;
    border: 1.5px solid rgba(232,130,12,0.4);
    background: transparent; color: var(--saffron);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }

  .clear-btn:hover { background: var(--saffron); color: white; }

  /* FULL PREP MODE */
  .prep-mode-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: var(--deep);
    overflow-y: auto;
  }

  .prep-mode-overlay.show { display: flex; flex-direction: column; }

  .prep-mode-header {
    position: sticky; top: 0;
    background: var(--deep);
    padding: 20px 28px;
    display: flex; align-items: center; gap: 16px;
    border-bottom: 1px solid rgba(232,130,12,0.15);
    z-index: 10;
  }

  .prep-mode-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px; color: var(--saffron); font-weight: 700;
  }

  .prep-mode-close {
    margin-left: auto;
    background: none; border: 1.5px solid rgba(253,248,242,0.2);
    color: #FDF8F2; padding: 8px 18px; border-radius: 20px;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    cursor: pointer; transition: all 0.2s;
  }

  .prep-mode-close:hover { background: rgba(253,248,242,0.1); }

  .prep-mode-body { padding: 28px; flex: 1; }

  .prep-mode-step {
    display: flex; align-items: flex-start; gap: 20px;
    padding: 20px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .prep-mode-step.done { opacity: 0.3; }

  .prep-mode-num {
    width: 44px; height: 44px; flex-shrink: 0;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700;
    background: var(--saffron-glow); color: var(--saffron);
    border: 2px solid var(--saffron);
    transition: all 0.2s;
  }

  .prep-mode-step.done .prep-mode-num {
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.2);
    font-size: 22px;
  }

  .prep-mode-text {
    font-size: 22px; line-height: 1.5;
    color: rgba(253,248,242,0.9);
    transition: all 0.2s;
    padding-top: 8px;
  }

  .prep-mode-step.done .prep-mode-text {
    text-decoration: line-through;
    color: rgba(253,248,242,0.2);
  }

  /* EXPAND ALL */
  .expand-all-btn {
    padding: 8px 18px; border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent; color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    margin-bottom: 20px;
  }

  .expand-all-btn:hover { border-color: var(--saffron); color: var(--saffron); }

  /* KITCHEN MODE BTN */
  .kitchen-mode-btn {
    position: fixed; bottom: 28px; right: 28px;
    padding: 14px 22px; border-radius: 30px;
    background: var(--saffron);
    color: white; border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer; z-index: 50;
    box-shadow: 0 4px 20px rgba(232,130,12,0.4);
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }

  .kitchen-mode-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(232,130,12,0.5);
  }

  /* ── FULL RECIPE PANEL ── */
  .recipe-panel { padding: 16px 18px 20px; }
  .recipe-panel-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 900; color: var(--text); line-height: 1.2; }
  .recipe-panel-subtitle { font-size: 12px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
  .recipe-meta { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0 14px; }
  .recipe-meta-chip { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; background: var(--saffron-light); color: var(--saffron); border: 1px solid rgba(232,130,12,0.2); }
  .recipe-desc-text { font-size: 13px; line-height: 1.65; color: var(--muted); font-style: italic; margin-bottom: 14px; padding-left: 10px; border-left: 2px solid var(--border); }
  .recipe-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--saffron); margin: 14px 0 8px; }
  .ingredient-group { margin-bottom: 10px; }
  .ingredient-group-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 4px; }
  .ingredient-list { list-style: none; }
  .ingredient-item { display: flex; align-items: baseline; gap: 8px; padding: 3px 0; border-bottom: 1px solid rgba(232,130,12,0.06); font-size: 13.5px; line-height: 1.5; color: var(--text); }
  .ingredient-item::before { content: '·'; color: var(--saffron); font-weight: 700; flex-shrink: 0; }
  .optional-group { opacity: 0.78; }
  .optional-group .ingredient-group-name { color: var(--green); }
  .method-steps { list-style: none; margin-top: 4px; }
  .method-step { display: flex; gap: 14px; padding: 11px 0; border-bottom: 1px solid rgba(232,130,12,0.08); }
  .method-step:last-child { border-bottom: none; }
  .method-step-num { width: 28px; height: 28px; flex-shrink: 0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; background: var(--saffron); color: white; margin-top: 1px; }
  .method-step-content { flex: 1; }
  .method-step-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .method-step-text { font-size: 13.5px; line-height: 1.6; color: #4a3020; }
  .method-step-timer { display: inline-flex; align-items: center; gap: 4px; margin-top: 5px; font-size: 11px; font-weight: 600; background: var(--saffron-light); color: var(--saffron); padding: 2px 9px; border-radius: 10px; }
  .texture-box { background: linear-gradient(135deg, var(--saffron-light), #fff8ed); border: 1px solid rgba(232,130,12,0.25); border-radius: 10px; padding: 12px 14px; font-size: 13px; line-height: 1.55; color: var(--text); margin-top: 4px; }
  .serving-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .serving-tag { font-size: 12px; padding: 4px 12px; border-radius: 20px; background: var(--green-light); color: var(--green); border: 1px solid rgba(45,106,79,0.2); font-weight: 500; }

  /* ── SECTION HEADINGS ── */
  .section-heading {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Playfair Display', serif;
    font-size: 18px; font-weight: 700; color: var(--text);
    margin-bottom: 16px;
  }
  .section-icon { font-size: 20px; }
  .section-for-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    color: var(--muted); margin-left: 4px;
  }

  /* ── EVE PREP PANEL ── */
  .eve-prep-panel {
    display: flex; flex-direction: column; gap: 16px;
    background: var(--deep);
    border-radius: 16px; padding: 20px 22px;
    margin-bottom: 40px;
  }

  .eve-section { }

  .eve-section-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: rgba(232,130,12,0.7);
    margin-bottom: 10px;
  }

  .eve-icon { font-size: 14px; }

  .eve-prep-panel .step-item {
    border-bottom-color: rgba(255,255,255,0.06);
  }

  .eve-prep-panel .step-text { color: rgba(253,248,242,0.85); }
  .eve-prep-panel .step-item.done .step-text { color: rgba(253,248,242,0.25); }

  .eve-step-num {
    background: rgba(232,130,12,0.15) !important;
    border-color: rgba(232,130,12,0.3) !important;
    color: var(--saffron) !important;
  }

  .step-item.done .eve-step-num {
    background: rgba(255,255,255,0.05) !important;
    border-color: rgba(255,255,255,0.1) !important;
    color: rgba(255,255,255,0.2) !important;
  }

  .eve-tag {
    display: inline-block; margin-top: 4px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase; color: rgba(232,130,12,0.5);
    background: rgba(232,130,12,0.08);
    padding: 2px 8px; border-radius: 8px;
  }

  /* ── SHOPPING VIEW ── */
  .shop-section-header {
    cursor: pointer;
  }

/* ── WEEK SELECTOR ── */
  .week-tabs {
    display: flex; gap: 6px; align-items: center;
    padding: 4px 0; margin-bottom: 8px;
  }
  .week-tab {
    background: transparent;
    border: 1.5px solid rgba(232,130,12,0.3);
    color: rgba(253,248,242,0.6);
    border-radius: 20px; padding: 5px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .week-tab:hover { border-color: var(--saffron); color: var(--saffron); }
  .week-tab.active {

  .shop-progress-bar {
    height: 4px; background: rgba(232,130,12,0.15);
    border-radius: 2px; margin-bottom: 16px; overflow: hidden;
  }
  .shop-progress-fill {
    height: 100%; background: var(--green);
    border-radius: 2px; transition: width 0.3s;
  }
  .shop-progress-label {
    font-size: 12px; color: var(--green); font-weight: 600;
    margin-bottom: 16px;
  }
  .shop-actions {
    display: flex; gap: 10px; margin-bottom: 20px;
  }
  .shop-btn {
    background: transparent; border: 1.5px solid rgba(232,130,12,0.3);
    color: var(--saffron); border-radius: 20px; padding: 6px 16px;
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .shop-btn:hover { background: var(--saffron-light); }


  /* ── PREP GUIDE ACCORDION (native <details>) ── */
  .pg-details {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .pg-summary {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 16px 20px;
    cursor: pointer;
    border-left: 4px solid var(--saffron);
    list-style: none;
    user-select: none;
    transition: background 0.15s;
  }
  .pg-summary::-webkit-details-marker { display: none; }
  .pg-summary::marker { display: none; }
  .pg-summary:hover { background: var(--saffron-light); }
  .pg-details[open] .pg-summary { background: var(--saffron-light); }
  .pg-summary-chevron {
    font-size: 18px;
    color: var(--muted);
    margin-left: auto;
    flex-shrink: 0;
    transition: transform 0.2s;
    padding-top: 2px;
  }
  .pg-details[open] .pg-summary-chevron { transform: rotate(180deg); }
  .pg-details-body {
    padding: 4px 20px 18px;
    border-top: 1px solid var(--border);
  }
  .pg-note-box {
    margin-top: 12px;
    background: #FFF8E7;
    border-left: 3px solid var(--saffron);
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    color: var(--mid);
    line-height: 1.5;
  }
</style>
</head>

const DAYS = ["Saturday","Sunday","Monday","Tuesday","Wednesday","Thursday","Friday"];
let activeDay = DAYS[0];
let activeWeek = 1;
let doneSteps = {};
let openCards = {};
let activeCardTab = {};
let snackEdits = {}; // persists editable snack field changes in-session

function stepId(day, mealIdx, type, stepIdx) {
  return `${day}_${mealIdx}_${type}_${stepIdx}`;
}

function parseSteps(text) {
  if (!text || !text.trim()) return [];
  return text.split('\n').map(s => s.trim()).filter(s => s.length > 2);
}

function extractTime(step) {
  const m = step.match(/(\d+)\s*min/i);
  return m ? parseInt(m[1]) : null;
}

function getMealSlotType(meal) {
  const m = meal.toLowerCase();
  if (m.includes('comfort')) return 'comfort';
  if (m.includes('eat out')) return 'eat-out';
  if (m.includes('kids snack') || m.includes('morning snack')) return 'snack';
  return 'normal';
}

function getMealTimeLabel(meal) {
  if (meal.includes('10 AM')) return '10 AM';
  if (meal.includes('11:00')) return '11:00 AM';
  if (meal.includes('1:30')) return '1:30 PM';
  if (meal.includes('5:00')) return '5:00 PM';
  if (meal.includes('5:30')) return '5:30 PM';
  return meal.split(' ').slice(0,2).join(' ');
}

function getMealDisplayName(meal) {
  if (meal.includes('Breakfast')) return 'Breakfast';
  if (meal.includes('Morning Snack')) return 'Morning Snack';
  if (meal.includes('Lunch')) return 'Lunch';
  if (meal.includes('Kids Snack')) return 'Evening Snack';
  if (meal.includes('COMFORT')) return '✨ Comfort Evening';
  if (meal.includes('EAT OUT')) return '🍽 Eat Out';
  if (meal.includes('Evening')) return 'Evening';
  return meal;
}

function countStepsForDay(day, week) {
  week = week || activeWeek;
  const dayMeals = MEAL_DATA.filter(m => m.day === day && m.week === week);
  let total = 0, done = 0;
  // Count morning steps per meal
  dayMeals.forEach((meal, idx) => {
    parseSteps(meal.morning).forEach((_, sIdx) => {
      const id = stepId(day, idx, 'morning', sIdx);
      total++;
      if (doneSteps[id]) done++;
    });
  });
  // Count evening prep steps (collated)
  const evePrepData = EVE_PREP[day];
  if (evePrepData) {
    evePrepData.sections.forEach((sec, secIdx) => {
      sec.items.forEach((_, itemIdx) => {
        const id = `eve_${day}_${secIdx}_${itemIdx}`;
        total++;
        if (doneSteps[id]) done++;
      });
    });
  }
  return { total, done };
}

function render() {
  if (activeView !== 'mealplan') return;
  renderDayTabs();
  renderMain();
}

function renderDayTabs() {
  const container = document.getElementById('dayTabs');
  // Week selector
  const weekSel = `<span class="week-label">Week</span>` + [1,2,3].map(w => 
    `<button class="week-tab ${w === activeWeek ? 'active' : ''}" onclick="switchWeek(${w})">${w}</button>`
  ).join('');
  // Day tabs
  const dayTabsHtml = DAYS.map(day => {
    const { total, done } = countStepsForDay(day, activeWeek);
    const pct = total > 0 ? Math.round(done/total*100) : 0;
    const badge = total > 0 ? ` (${pct}%)` : '';
    return `<button class="day-tab ${day === activeDay ? 'active' : ''}" 
              onclick="selectDay('${day}')">${day}${badge}</button>`;
  }).join('');
  container.innerHTML = `<div class="week-tabs">${weekSel}</div>${dayTabsHtml}`;
}

function switchWeek(w) {
  activeWeek = w;
  openCards = {};
  activeCardTab = {};
  doneSteps = {};
  // Auto-open all cards for the active day in the new week
  MEAL_DATA.filter(m => m.day === activeDay && m.week === w).forEach((meal, idx) => {
    const key = `${activeDay}_${idx}`;
    openCards[key] = true;
    activeCardTab[key] = parseSteps(meal.morning).length > 0 ? 'prep' : 'dish';
  });
  renderDayTabs();
  renderMain();
}

function renderMain() {
  const main = document.getElementById('main');
  const dayMeals = MEAL_DATA.filter(m => m.day === activeDay && m.week === activeWeek);
  const { total, done } = countStepsForDay(activeDay, activeWeek);
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  const evePrepData = EVE_PREP[activeDay + "_" + activeWeek];

  let html = '';

  // Summary bar
  const morningCount = dayMeals.reduce((acc, m) => acc + parseSteps(m.morning).length, 0);
  const eveCount = evePrepData ? evePrepData.sections.reduce((acc,s) => acc + s.items.length, 0) : 0;

  html += `
    <div class="prep-summary">
      <div class="prep-label">Week ${activeWeek} — ${activeDay}</div>
      <div class="prep-divider"></div>
      <div class="prep-stat"><div class="prep-stat-num">${morningCount}</div><div class="prep-stat-lbl">Morning Steps</div></div>
      <div class="prep-divider"></div>
      <div class="prep-stat"><div class="prep-stat-num">${eveCount}</div><div class="prep-stat-lbl">Tonight's Prep</div></div>
      <div class="prep-divider"></div>
      <div class="prep-stat"><div class="prep-stat-num">${done}/${total}</div><div class="prep-stat-lbl">Done</div></div>
      <div style="flex:1"></div>
      <button class="clear-btn" onclick="clearDaySteps()">Reset Day</button>
    </div>`;

  // Day title
  html += `
    <div class="day-title-bar">
      <div class="day-title">${activeDay}</div>
      <div class="day-subtitle">${dayMeals.length} meals • ${morningCount + eveCount} prep steps</div>
      <div class="progress-ring">
        <span>${pct}% complete</span>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;

  // ── SECTION LABEL: TODAY'S MEALS ──
  html += `<div class="section-heading"><span class="section-icon">🍽</span> Today's Meals
    <button class="expand-all-btn" onclick="expandAll()" style="margin-left:auto;margin-bottom:0;">Expand All</button>
  </div>`;

  // ── SECTION: MORNING PREP PANEL ──
  const mornMeals = dayMeals.filter(m => !m.kids_snack_editable && parseSteps(m.morning).length > 0);
  if (mornMeals.length > 0) {
    html += `<div class="section-heading" style="margin-top:8px;margin-bottom:12px;">
      <span class="section-icon">☀️</span> Morning Prep
      <span class="section-for-label">→ for today</span>
    </div>`;
    html += `<div class="morn-prep-panel">`;
    mornMeals.forEach((meal, mIdx) => {
      const steps = parseSteps(meal.morning);
      const mealIdx = dayMeals.indexOf(meal);
      const mealLabel = getMealDisplayName(meal.meal);
      const mealTime = meal.meal.match(/^(\d+:\d+ [AP]M)/)?.[1] || '';
      html += `<div class="morn-meal-section">`;
      html += `<div class="morn-meal-label"><span>${meal.meal.match(/[☀🥗🌿🍳🌟🪷]/u)?.[0] || '🍽'}</span>${escapeHtml(mealTime + (mealTime ? ' — ' : '') + mealLabel)}</div>`;
      html += `<ul class="steps-list">`;
      steps.forEach((step, sIdx) => {
        const id = stepId(activeDay, mealIdx, 'morning', sIdx);
        const isDone = doneSteps[id];
        const mins = extractTime(step);
        html += `<li class="step-item ${isDone ? 'done' : ''}" onclick="toggleStep('${id}')">
          <div class="step-num morn-step-num">${isDone ? '✓' : sIdx + 1}</div>
          <div style="flex:1">
            <div class="step-text">${escapeHtml(step)}</div>
            ${mins ? `<div class="morn-time-badge">⏱ ${mins} min</div>` : ''}
          </div>
        </li>`;
      });
      html += `</ul></div>`;
    });
    html += `</div>`;
  }

  // Meal cards (morning prep only)
  html += '<div class="meals-grid">';
  dayMeals.forEach((meal, idx) => {
    const type = getMealSlotType(meal.meal);
    const isOpen = openCards[`${activeDay}_${idx}`];
    const activeTab = activeCardTab[`${activeDay}_${idx}`] || 'prep';
    const morningStepsList = parseSteps(meal.morning);

    // ── SNACK CARD: special compact editable layout ──
    if (type === 'snack') {
      const snackKey = `snack_${activeDay}_${idx}`;
      const isMorning = meal.snack_type === 'morning' || meal.meal.includes('Morning');
      const isEvening = !isMorning;

      if (isMorning) {
        // Morning snack: nuts + fruit, two rows
        const savedNuts = snackEdits[snackKey + '_nuts'] || meal.kids.split('\n')[0].replace('🥜 ','');
        const savedFruit = snackEdits[snackKey + '_fruit'] || meal.kids.split('\n')[1]?.replace('🍎 ','') || '';
        html += `<div class="meal-card snack-card snack-morning" id="card_${activeDay}_${idx}">
          <div class="snack-header">
            <div>
              <div class="meal-time" style="color:#7B5EA7;">11:00 AM</div>
              <div class="meal-name">🥜 Kids Morning Snack</div>
            </div>
            <span class="snack-edit-badge morning-badge">editable</span>
          </div>
          <div class="snack-body">
            <div class="snack-row">
              <span class="snack-icon">🥜</span>
              <input class="snack-input morning-input" type="text" value="${escapeAttr(savedNuts)}"
                onchange="saveSnack('${snackKey}_nuts', this.value)"
                placeholder="nuts (e.g. 5 almonds + 1 walnut)" />
            </div>
            <div class="snack-row">
              <span class="snack-icon">🍎</span>
              <input class="snack-input morning-input" type="text" value="${escapeAttr(savedFruit)}"
                onchange="saveSnack('${snackKey}_fruit', this.value)"
                placeholder="fruit (e.g. banana slices)" />
            </div>
          </div>
        </div>`;
      } else {
        // Evening snack: single editable row
        const raw = meal.kids || '';
        const defaultVal = raw.replace('🪷 ','').replace('🥜 ','').replace('🍎 ','');
        const savedVal = snackEdits[snackKey + '_main'] || defaultVal;
        html += `<div class="meal-card snack-card snack-evening" id="card_${activeDay}_${idx}">
          <div class="snack-header">
            <div>
              <div class="meal-time" style="color:#2D6A4F;">5:00 PM</div>
              <div class="meal-name">🪷 Kids Evening Snack</div>
            </div>
            <span class="snack-edit-badge">editable</span>
          </div>
          <div class="snack-body">
            <div class="snack-row">
              <span class="snack-icon">🪷</span>
              <input class="snack-input" type="text" value="${escapeAttr(savedVal)}"
                onchange="saveSnack('${snackKey}_main', this.value)"
                placeholder="e.g. Makhana — 1 small bowl" />
            </div>
            <div class="snack-note">Kids dinner at 7 PM</div>
          </div>
        </div>`;
      }
      return;
    }

    html += `<div class="meal-card ${type} ${isOpen ? 'open' : ''}" id="card_${activeDay}_${idx}">`;

    // Card header
    html += `
      <div class="card-header" onclick="toggleCard('${activeDay}', ${idx})">
        <div>
          ${type === 'comfort' ? '<span class="badge badge-comfort">🌟 Comfort Night</span><br>' : ''}
          ${type === 'eat-out' ? '<span class="badge badge-eatout">🍽 Eat Out</span><br>' : ''}
          <div class="meal-time">${getMealTimeLabel(meal.meal)}</div>
          <div class="meal-name">${getMealDisplayName(meal.meal)}</div>
        </div>
        <div class="card-chevron">▾</div>
      </div>`;

    if (isOpen) {
      html += `<div class="card-body">`;
      html += `<div class="card-tabs">
        <button class="card-tab ${activeTab === 'dish' ? 'active' : ''}" onclick="switchTab('${activeDay}', ${idx}, 'dish')">🍽 Dish</button>
        <button class="card-tab ${activeTab === 'prep' ? 'active' : ''}" onclick="switchTab('${activeDay}', ${idx}, 'prep')">🌅 Morning Prep</button>
        <button class="card-tab ${activeTab === 'kids' ? 'active' : ''}" onclick="switchTab('${activeDay}', ${idx}, 'kids')">👶 Kids</button>
        ${meal.macros ? `<button class="card-tab nutrition-tab ${activeTab === 'nutrition' ? 'active' : ''}" onclick="switchTab('${activeDay}', ${idx}, 'nutrition')">📊 Nutrition</button>` : ''}
        ${meal.full_recipe ? `<button class="card-tab ${activeTab === 'fullrecipe' ? 'active' : ''}" onclick="switchTab('${activeDay}', ${idx}, 'fullrecipe')">📜 Full Recipe</button>` : ''}
      </div>`;

      // Dish tab
      html += `<div class="tab-panel ${activeTab === 'dish' ? 'active' : ''}">`;
      html += `<div class="dish-desc">${escapeHtml(meal.adult)}</div>`;
      // Recipe book link
      const noRecipe = ['Eating Out', 'Kids Evening Snack', 'Kids Morning Snack'];
      if (meal.recipe_label && !noRecipe.includes(meal.recipe_label)) {
        const recipeId = meal.recipe_label.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
        html += `<button class="recipe-link" onclick="selectRecipe('${recipeId}');switchView('recipes')">📖 ${meal.recipe_label} ↗</button>`;
      } else if (meal.recipe_url && meal.recipe_url.startsWith('http')) {
        html += `<a href="${meal.recipe_url}" target="_blank" class="recipe-link">📖 ${meal.recipe_label || 'View Recipe'} ↗</a>`;
      }
      html += `</div>`;

      // Morning prep tab
      html += `<div class="tab-panel ${activeTab === 'prep' ? 'active' : ''}">`;
      if (morningStepsList.length > 0) {
        html += `<ul class="steps-list">`;
        morningStepsList.forEach((step, sIdx) => {
          const id = stepId(activeDay, idx, 'morning', sIdx);
          const isDone = doneSteps[id];
          const mins = extractTime(step);
          html += `<li class="step-item ${isDone ? 'done' : ''}" onclick="toggleStep('${id}')">
            <div class="step-num">${isDone ? '✓' : sIdx + 1}</div>
            <div style="flex:1">
              <div class="step-text">${escapeHtml(step)}</div>
              ${mins ? `<div class="timer-badge">⏱ ${mins} min</div>` : ''}
            </div>
          </li>`;
        });
        html += `</ul>`;
      } else {
        html += `<p class="no-steps">No morning prep needed — comes together while eating!</p>`;
      }
      html += `</div>`;

      // Kids tab
      html += `<div class="tab-panel ${activeTab === 'kids' ? 'active' : ''}">`;
      html += `<div class="kids-section"><div class="kids-label">👶 For the Kids</div><div>${escapeHtml(meal.kids)}</div></div>`;
      html += `</div>`;

      // Nutrition tab
      if (meal.macros) {
        const mx = meal.macros;
        const rdaPct = (val, rda) => Math.min(100, Math.round(val / rda * 100));
        const bar = (pct, color) => `<div class="nbar-bg"><div class="nbar-fill" style="width:${pct}%;background:${color}"></div></div>`;
        const row = (label, val, unit, rda, color, flag) => `
          <tr class="nrow">
            <td class="nlabel">${label}</td>
            <td class="nval">${val}<span class="nunit">${unit}</span></td>
            <td class="nbar-cell">${bar(rdaPct(val,rda), color)}</td>
            <td class="npct">${rdaPct(val,rda)}%${flag ? ' <span class="nflag">'+flag+'</span>' : ''}</td>
          </tr>`;
        html += `<div class="tab-panel ${activeTab === 'nutrition' ? 'active' : ''}">
          <div class="nutrition-panel">
            <div class="nutrition-disclaimer">📐 Per adult serving • ±15% estimated • <em>${escapeHtml(mx.note)}</em></div>
            <div class="nutri-section-label">Macronutrients</div>
            <table class="nutri-table">
              <thead><tr><th>Nutrient</th><th>Amount</th><th class="th-bar"></th><th>% RDA</th></tr></thead>
              <tbody>
                ${row('Calories', mx.kcal, ' kcal', 2000, '#E8820C', '')}
                ${row('Protein', mx.protein, 'g', 85, '#5B8C5A', '')}
                ${row('Carbohydrates', mx.carbs, 'g', 300, '#4A90D9', '')}
                ${row('Fat', mx.fat, 'g', 65, '#F5A623', '')}
                ${row('Fiber', mx.fiber, 'g', 30, '#7B5EA7', '')}
              </tbody>
            </table>
            <div class="nutri-section-label" style="margin-top:14px">Key Micronutrients</div>
            <table class="nutri-table">
              <thead><tr><th>Nutrient</th><th>Amount</th><th class="th-bar"></th><th>% RDA</th></tr></thead>
              <tbody>
                ${row('Iron', mx.iron, 'mg', 18, '#C0392B', '')}
                ${row('Calcium', mx.calcium, 'mg', 1000, '#2980B9', '')}
                ${row('Vitamin B12', mx.b12, 'mcg', 2.4, '#8E44AD', mx.b12 < 0.5 ? '⚠ plant meal' : '')}
                ${row('Zinc', mx.zinc, 'mg', 11, '#27AE60', '')}
                ${row('Vitamin C', mx.vitc, 'mg', 90, '#E74C3C', '')}
                ${row('Folate', mx.folate, 'mcg', 400, '#16A085', '')}
              </tbody>
            </table>
          </div>
        </div>`;
      }

      // Full Recipe tab
      if (meal.full_recipe) {
        const fr = meal.full_recipe;
        html += `<div class="tab-panel ${activeTab === 'fullrecipe' ? 'active' : ''}"><div class="recipe-panel">`;
        html += `<div class="recipe-panel-title">${escapeHtml(fr.title)}</div>`;
        if (fr.subtitle) html += `<div class="recipe-panel-subtitle">${escapeHtml(fr.subtitle)}</div>`;
        html += `<div class="recipe-meta">`;
        if (fr.serves) html += `<span class="recipe-meta-chip">👥 Serves ${escapeHtml(fr.serves)}</span>`;
        html += `</div>`;
        if (fr.description) html += `<div class="recipe-desc-text">${escapeHtml(fr.description)}</div>`;
        html += `<div class="recipe-section-label">Ingredients</div>`;
        fr.ingredient_groups.forEach(group => {
          const isOpt = group.group.toLowerCase().includes('optional');
          html += `<div class="ingredient-group ${isOpt ? 'optional-group' : ''}">`;
          html += `<div class="ingredient-group-name">${escapeHtml(group.group)}</div><ul class="ingredient-list">`;
          group.items.forEach(item => { html += `<li class="ingredient-item">${escapeHtml(item)}</li>`; });
          html += `</ul></div>`;
        });
        html += `<div class="recipe-section-label">Method</div><ol class="method-steps">`;
        fr.steps.forEach(step => {
          html += `<li class="method-step">
            <div class="method-step-num">${step.num}</div>
            <div class="method-step-content">
              <div class="method-step-title">${escapeHtml(step.title)}</div>
              <div class="method-step-text">${escapeHtml(step.text)}</div>
              ${step.timer ? `<div class="method-step-timer">⏱ ${step.timer} min</div>` : ''}
            </div></li>`;
        });
        html += `</ol>`;
        if (fr.texture_goal) html += `<div class="recipe-section-label">Texture Goal</div><div class="texture-box">${escapeHtml(fr.texture_goal)}</div>`;
        if (fr.serving_ideas && fr.serving_ideas.length) {
          html += `<div class="recipe-section-label">Serving Ideas</div><div class="serving-tags">`;
          fr.serving_ideas.forEach(s => { html += `<span class="serving-tag">${escapeHtml(s)}</span>`; });
          html += `</div>`;
        }
        html += `</div></div>`;
      }

      html += `</div>`; // card-body
    }
    html += `</div>`; // meal-card
  });
  html += '</div>'; // meals-grid

  // ── DAILY NUTRITION TOTALS ──
  const dayMealsWithMacros = dayMeals.filter(m => m.macros);
  if (dayMealsWithMacros.length > 0) {
    const tot = dayMealsWithMacros.reduce((acc, m) => {
      acc.kcal += m.macros.kcal; acc.protein += m.macros.protein;
      acc.carbs += m.macros.carbs; acc.fat += m.macros.fat; acc.fiber += m.macros.fiber;
      acc.iron += m.macros.iron; acc.calcium += m.macros.calcium; acc.b12 += m.macros.b12;
      return acc;
    }, {kcal:0,protein:0,carbs:0,fat:0,fiber:0,iron:0,calcium:0,b12:0});
    html += `
    <div class="section-heading" style="margin-top:28px;">
      <span class="section-icon">📊</span> Daily Nutrition Totals
      <button class="export-btn" onclick="exportToExcel()">⬇ Export to Excel</button>
    </div>
    <div class="daily-nutrition-bar">
      <div class="dn-chip"><div class="dn-val">${tot.kcal}</div><div class="dn-lbl">kcal</div></div>
      <div class="dn-divider"></div>
      <div class="dn-chip"><div class="dn-val">${tot.protein}g</div><div class="dn-lbl">Protein</div></div>
      <div class="dn-chip"><div class="dn-val">${tot.carbs}g</div><div class="dn-lbl">Carbs</div></div>
      <div class="dn-chip"><div class="dn-val">${tot.fat}g</div><div class="dn-lbl">Fat</div></div>
      <div class="dn-chip"><div class="dn-val">${tot.fiber}g</div><div class="dn-lbl">Fiber</div></div>
      <div class="dn-divider"></div>
      <div class="dn-chip micro"><div class="dn-val">${tot.iron.toFixed(1)}mg</div><div class="dn-lbl">Iron</div></div>
      <div class="dn-chip micro"><div class="dn-val">${tot.calcium}mg</div><div class="dn-lbl">Calcium</div></div>
      <div class="dn-chip micro ${tot.b12 < 1.5 ? 'dn-warn' : ''}"><div class="dn-val">${tot.b12.toFixed(1)}mcg</div><div class="dn-lbl">B12${tot.b12 < 1.5 ? ' ⚠' : ''}</div></div>
    </div>`;
  }

  // ── SECTION: TONIGHT'S PREP ──
  if (evePrepData) {
    const nextDay = evePrepData.forDay;
    html += `<div class="section-heading" style="margin-top:32px;">
      <span class="section-icon">🌙</span> Tonight's Prep
      <span class="section-for-label">→ for ${nextDay}</span>
    </div>`;

    html += `<div class="eve-prep-panel">`;
    evePrepData.sections.forEach((sec, secIdx) => {
      if (sec.items.length === 0) return; // skip empty sections like "no soaking needed"
      html += `<div class="eve-section">`;
      html += `<div class="eve-section-label"><span class="eve-icon">${sec.icon}</span>${escapeHtml(sec.label)}</div>`;
      html += `<ul class="steps-list">`;
      sec.items.forEach((item, itemIdx) => {
        const id = `eve_${activeDay}_${secIdx}_${itemIdx}`;
        const isDone = doneSteps[id];
        html += `<li class="step-item ${isDone ? 'done' : ''}" onclick="toggleEveStep('${id}')">
          <div class="step-num eve-step-num">${isDone ? '✓' : itemIdx + 1}</div>
          <div style="flex:1">
            <div class="step-text">${escapeHtml(item.text)}</div>
            <span class="eve-tag">${escapeHtml(item.tag)}</span>
          </div>
        </li>`;
      });
      html += `</ul></div>`;
    });
    html += `</div>`; // eve-prep-panel
  }

  main.innerHTML = html;
}

function escapeHtml(text) {
  return String(text || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

function selectDay(day) {
  activeDay = day;
  // Auto-open all meal cards for this day; show prep tab if has morning steps, else dish
  MEAL_DATA.filter(m => m.day === day && m.week === activeWeek).forEach((meal, idx) => {
    const key = `${day}_${idx}`;
    if (openCards[key] === undefined) {
      openCards[key] = true;
      if (!activeCardTab[key]) {
        activeCardTab[key] = parseSteps(meal.morning).length > 0 ? 'prep' : 'dish';
      }
    }
  });
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleCard(day, idx) {
  const key = `${day}_${idx}`;
  openCards[key] = !openCards[key];
  if (openCards[key] && !activeCardTab[key]) {
    // default: if meal has morning prep show prep, else dish
    const meal = MEAL_DATA.filter(m => m.day === day && m.week === week)[idx];
    const hasMorning = parseSteps(meal.morning).length > 0;
    activeCardTab[key] = hasMorning ? 'prep' : 'dish';
  }
  renderMain();
}

function switchTab(day, idx, tab) {
  activeCardTab[`${day}_${idx}`] = tab;
  renderMain();

function exportToExcel() {
  // Build data rows for all days
  const rows = [];
  rows.push(['Day','Meal','Dish','Calories (kcal)','Protein (g)','Carbs (g)','Fat (g)','Fiber (g)','Iron (mg)','Calcium (mg)','Vitamin B12 (mcg)','Zinc (mg)','Vitamin C (mg)','Folate (mcg)','Notes']);
  DAYS.forEach(day => {
    MEAL_DATA.filter(m => m.day === day && m.macros).forEach(m => {
      const mx = m.macros;
      rows.push([
        day,
        getMealDisplayName(m.meal),
        mx.name,
        mx.kcal, mx.protein, mx.carbs, mx.fat, mx.fiber,
        mx.iron, mx.calcium, mx.b12, mx.zinc, mx.vitc, mx.folate,
        mx.note
      ]);
    });
    // Daily totals row
    const dayMx = MEAL_DATA.filter(m => m.day === day && m.macros);
    if (dayMx.length > 0) {
      const t = dayMx.reduce((a,m) => {
        a.kcal+=m.macros.kcal; a.pro+=m.macros.protein; a.carb+=m.macros.carbs;
        a.fat+=m.macros.fat; a.fib+=m.macros.fiber; a.fe+=m.macros.iron;
        a.ca+=m.macros.calcium; a.b12+=m.macros.b12; a.zn+=m.macros.zinc;
        a.vc+=m.macros.vitc; a.fol+=m.macros.folate; return a;
      }, {kcal:0,pro:0,carb:0,fat:0,fib:0,fe:0,ca:0,b12:0,zn:0,vc:0,fol:0});
      rows.push([day,'DAILY TOTAL','',t.kcal,t.pro,t.carb,t.fat,t.fib,
        +t.fe.toFixed(1),t.ca,+t.b12.toFixed(1),+t.zn.toFixed(1),t.vc,t.fol,'']);
      rows.push([]); // blank spacer
    }
  });

  // Use SheetJS
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  script.onload = () => {
    const ws = XLSX.utils.aoa_to_sheet(rows);
    // Column widths
    ws['!cols'] = [14,16,38,14,12,12,12,12,10,12,16,10,12,12,40].map(w=>({wch:w}));
    // Style header row (bold)
    const range = XLSX.utils.decode_range(ws['!ref']);
    for (let c = range.s.c; c <= range.e.c; c++) {
      const hdr = XLSX.utils.encode_cell({r:0,c});
      if (!ws[hdr]) continue;
      ws[hdr].s = {font:{bold:true}, fill:{fgColor:{rgb:'FFE0C070'}}};
    }
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Nutrition');
    // Add RDA reference sheet
    const rdaRows = [
      ['Nutrient','RDA (adults)','Unit','Notes'],
      ['Calories','2000','kcal','General reference'],
      ['Protein','85','g','Higher end for active adults'],
      ['Carbohydrates','300','g',''],
      ['Fat','65','g',''],
      ['Fiber','30','g',''],
      ['Iron','18','mg','Higher for women'],
      ['Calcium','1000','mg',''],
      ['Vitamin B12','2.4','mcg','Supplement advised for plant-heavy diets'],
      ['Zinc','11','mg',''],
      ['Vitamin C','90','mg',''],
      ['Folate','400','mcg',''],
    ];
    const ws2 = XLSX.utils.aoa_to_sheet(rdaRows);
    ws2['!cols'] = [22,18,10,42].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb, ws2, 'RDA Reference');
    XLSX.writeFile(wb, 'PrepWise_Nutrition.xlsx');
  };
  document.head.appendChild(script);
}

function escapeAttr(text) {
  return String(text || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function expandAll() {
  const dayMeals = MEAL_DATA.filter(m => m.day === activeDay && m.week === activeWeek);
  dayMeals.forEach((meal, idx) => {
    if (getMealSlotType(meal.meal) === 'snack') return; // snack cards are always open
    const key = `${activeDay}_${idx}`;
    openCards[key] = true;
    if (!activeCardTab[key]) {
      const hasMorning = parseSteps(meal.morning).length > 0;
      activeCardTab[key] = hasMorning ? 'prep' : 'dish';
    }
  });
  renderMain();
}

// ── KITCHEN MODE ──
function openKitchenMode() {
  const overlay = document.getElementById('prepOverlay');
  const body = document.getElementById('overlayBody');
  const titleEl = document.getElementById('overlayTitle');

  titleEl.textContent = `🍳 Kitchen Mode — ${activeDay}`;

  const dayMeals = MEAL_DATA.filter(m => m.day === activeDay && m.week === activeWeek);
  const evePrepData = EVE_PREP[activeDay + "_" + activeWeek];
  const allItems = [];

  // Morning steps per meal
  const hasMorning = dayMeals.some(m => parseSteps(m.morning).length > 0);
  if (hasMorning) {
    allItems.push({ isHeader: true, header: '🌅 Morning Prep — for today\'s meals' });
    dayMeals.forEach((meal, mIdx) => {
      const steps = parseSteps(meal.morning);
      if (steps.length > 0) {
        allItems.push({ isSub: true, header: getMealTimeLabel(meal.meal) + ' ' + getMealDisplayName(meal.meal) });
        steps.forEach((step, sIdx) => {
          allItems.push({ text: step, id: stepId(activeDay, mIdx, 'morning', sIdx) });
        });
      }
    });
  }

  // Evening prep collated
  if (evePrepData) {
    allItems.push({ isHeader: true, header: `🌙 Tonight's Prep — for ${evePrepData.forDay}` });
    evePrepData.sections.forEach((sec, secIdx) => {
      if (sec.items.length === 0) return;
      allItems.push({ isSub: true, header: sec.icon + ' ' + sec.label });
      sec.items.forEach((item, itemIdx) => {
        allItems.push({ text: item.text, id: `eve_${activeDay}_${secIdx}_${itemIdx}`, tag: item.tag });
      });
    });
  }

  if (allItems.length === 0) {
    body.innerHTML = `<div style="color:rgba(253,248,242,0.5);text-align:center;padding:60px 0;font-size:18px;">No prep steps for ${activeDay}.</div>`;
  } else {
    let stepCount = 0;
    body.innerHTML = allItems.map(s => {
      if (s.isHeader) return `<div style="font-family:'Playfair Display',serif;color:var(--saffron);padding:28px 0 6px;font-size:15px;font-weight:700;border-top:1px solid rgba(232,130,12,0.15);margin-top:8px;">${s.header}</div>`;
      if (s.isSub) return `<div style="font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:rgba(253,248,242,0.35);padding:12px 0 4px;">${s.header}</div>`;
      const isDone = doneSteps[s.id];
      stepCount++;
      const n = stepCount;
      return `
        <div class="prep-mode-step ${isDone ? 'done' : ''}" onclick="toggleKitchenStep('${s.id}', this)">
          <div class="prep-mode-num">${isDone ? '✓' : n}</div>
          <div>
            <div class="prep-mode-text">${escapeHtml(s.text)}</div>
            ${s.tag ? `<span style="font-size:11px;color:rgba(232,130,12,0.5);font-weight:600;">${escapeHtml(s.tag)}</span>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function toggleKitchenStep(id, el) {
  doneSteps[id] = !doneSteps[id];
  el.classList.toggle('done');
  const num = el.querySelector('.prep-mode-num');
  if (doneSteps[id]) {
    num.textContent = '✓';
  } else {
    // restore original number — re-render
    openKitchenMode();
    return;
  }
  renderDayTabs(); // update progress %
}

function closeKitchenMode() {
  document.getElementById('prepOverlay').classList.remove('show');
  document.body.style.overflow = '';
  render();
}

ong dal, grind smooth together with minimal water. Add sprouted mung, blend briefly.","Add ragi flour + rolled oats (dry). Blend to thick pourable batter — slight texture from oats is fine.","Stir in moringa powder + flaxseed powder + salt.","Ferment 8–10 hrs loosely covered in a warm spot. Should be bubbly and risen. Refrigerate.","Saturday breakfast: use this batter straight for ragi dosas. Add nutritional yeast just before cooking.","Sunday (day 2): pull from fridge, rest 10 min. Stir in grated tomato + hing + nutritional yeast. Cook dosas.","Each dosa: pour ladle onto hot tawa, spread thin, cook 2–3 min until edges lift. Flip, 1 min.","Serve with sambar (fresh tadka) + sautéed spinach + boiled eggs + nuts + seed powders."],"note":"Nutritional enhancements: oats add beta-glucan (steadier blood sugar, thyroid-friendly) · moong dal boosts protein (~6g extra per serving) + folate + zinc · flaxseed powder: omega-3 ALA + lignans (fermentation makes it safe for hypothyroidism) · sprouted mung: live enzymes, higher iron + zinc bioavailability, vitamin C · moringa: iron, calcium, vitamin K · nutritional yeast (post-ferment only): B12 + complete protein — never add before fermentation · Ragi itself is exceptionally high in calcium and iron — this is the most nutrient-dense batter of the three weeks.","id":"ragi_dosa_eggs","recipe_label":"Ragi Dosa + Eggs"},{"label":"Moringa Dosa","title":"Moringa Dosa (W1 Sunday)","category":"breakfasts","servings":"Family of 4","ingredients":["W1 idli/dosa batter — enhanced (from Sat ferment):","  · 1½ cups idli rice + ½ cup rolled oats + ½ cup moong dal + 1 cup urad dal","  · ½ cup sprouted mung + 1 tsp moringa powder + 1 tsp flaxseed powder","  · 1–2 tbsp nutritional yeast — add ONLY just before cooking","Variation for Sunday: 1 tsp cumin seeds + 1 small onion, caramelised","Fresh sambar tadka ingredients","Coconut chutney + tomato chutney to serve","Side: 1 cup green beans + 2 carrots (steamed)"],"steps":["Pull batter from fridge, rest 10 min. Thin with water to pouring consistency.","Stir in caramelised onion + cumin seeds. Add nutritional yeast just before cooking — never earlier.","Heat tawa until a drop of water sizzles off instantly. Brush lightly with oil.","Pour 1 ladle batter, spread thin in circular motion. Cook 2–3 min until edges lift and base is golden.","Flip, cook 1 min. Repeat for remaining dosas.","Fresh tadka for sambar: ghee + mustard seeds + curry leaves + dried chilli, 2 min.","Steam green beans + carrot 8 min. Serve dosas with sambar + chutneys + steamed veg."],"note":"Batter enhancements (all weeks): ½ cup oats (beta-glucan) · ½ cup moong dal (protein + folate) · ½ cup sprouted mung (enzyme activity, vitamin C, iron bioavailability) · 1 tsp moringa powder (iron, calcium) · 1 tsp flaxseed powder (omega-3, lignans — fermentation makes it thyroid-safe) · nutritional yeast post-ferment (B12). Never add yeast before fermentation.","id":"moringa_dosa","recipe_label":"Moringa Dosa"},{"label":"Moringa Ragi Dosa","title":"Moringa Ragi Dosa (W2 Sunday)","category":"breakfasts","servings":"Family of 4","ingredients":["W2 ragi dosa batter — enhanced (day 2, from Sat ferment):","  · 1 cup ragi flour + ½ cup rolled oats + ½ cup moong dal + 1 cup urad dal","  · ½ cup sprouted mung + 1 tsp moringa powder + 1 tsp flaxseed powder","  · 1–2 tbsp nutritional yeast — add ONLY just before cooking","Variation for Sunday: 1 ripe tomato, finely grated + pinch asafoetida (hing)","Side: 1 cup green beans + 2 carrots (steamed)","Tomato chutney + coconut chutney + sambar (fresh tadka)"],"steps":["Pull W2 ragi batter from fridge, rest 10 min. Thin slightly with water — day-2 batter spreads thinner and crispier.","Stir in grated tomato + hing. Add nutritional yeast just before cooking.","Heat tawa well. Pour ladle, spread thin. Cook 2–3 min until crisp and edges lift.","Flip, cook 1 min. Ragi dosas are naturally darker — that's normal.","Steam green beans + carrot 8 min. Fresh tadka for sambar.","Serve w "moong_dal_chilla","recipe_label":"Moong Dal Chilla"},{"label":"Moong Dal Chilla + Lauki","title":"Moong Dal Chilla with Bottle Gourd (W2 Mon)","category":"breakfasts","servings":"Family of 4","ingredients":["1 cup moong dal batter (as above)","½ cup lauki (bottle gourd), finely grated","½ tsp cumin","Salt to taste","Side: sliced cucumber + tomato","1–2 Brazil nuts"],"steps":["Grate lauki and squeeze out excess moisture in a clean cloth.","Stir grated lauki + cumin into moong dal batter.","Cook chillas on hot pan 2–3 min per side.","Serve with green chutney, sliced veg, Brazil nuts."],"note":"","id":"moong_dal_chilla_lauki","recipe_label":"Moong Dal Chilla + Lauki"},{"label":"Desi Egg Bhurji","title":"Desi Egg Bhurji","category":"breakfasts","servings":"Family of 4","ingredients":["2 eggs per adult","1 small onion, finely diced","1 medium tomato, diced","½ capsicum, diced","Fresh dill, small handful","½ tsp turmeric","Salt + chilli to taste","Hemp seeds (1 tsp)","Toast to serve"],"steps":["Heat 1 tsp oil/ghee in pan. Add onion, sauté 3 min until soft.","Add capsicum + tomato + turmeric + chilli. Cook 3 min.","Beat eggs, pour in. Stir gently like scrambled eggs 2–3 min — don't over-cook.","Add fresh dill + hemp seeds. Serve with toast."],"note":"","id":"desi_egg_bhurji","recipe_label":"Desi Egg Bhurji"},{"label":"Egg Bhurji (Thursday)","title":"Egg Bhurji with Capsicum & Tomato (W2 Thu)","category":"breakfasts","servings":"Family of 4","ingredients":["2 eggs per adult","½ capsicum, diced","1 tomato, diced","Fresh dill","½ tsp turmeric","Hemp seeds","Toast + side: sliced cucumber + carrot sticks"],"steps":["Sauté capsicum + tomato in ghee 4 min.","Add beaten eggs + turmeric + dill. Scramble gently 2 min.","Finish with hemp seeds. Serve with toast + cucumber + carrot."],"note":"","id":"egg_bhurji_thursday","recipe_label":"Egg Bhurji (Thursday)"},{"label":"Egg Mushroom Scramble","title":"Egg & Mushroom Scramble","category":"breakfasts","servings":"Family of 4","ingredie
