 almonds + 1 walnut + 1 dried fig"],"steps":["Mix ragi flour + flaxseed powder + salt. Add warm water gradually to form soft dough.","Divide into balls. Place on damp cloth, press flat with fingers or roll between sheets.","Cook on hot tawa 2–3 min per side until cooked through.","Serve with homemade curd + green chutney + veg side + nuts."],"note":"Ragi roti is gluten-free. The dough is more fragile — handle gently. Use a damp cloth to press out.","id":"ragi_roti_curd","recipe_label":"Ragi Roti + Curd"},{"label":"Vegetable Dalia","title":"Vegetable Dalia (W3 Mon)","category":"breakfasts","servings":"Family of 4","ingredients":["1½ cups daliya (broken wheat)","1 carrot, diced","½ cup peas","1 capsicum, diced","1 onion, diced","1 tsp mustard seeds","8–10 curry leaves","1 tsp ghee","Flaxseed powder (1 tsp per adult, stirred in)","1–2 Brazil nuts per adult"],"steps":["Heat ghee. Splutter mustard seeds + curry leaves.","Add onion, sauté 4 min. Add carrot + capsicum + peas.","Add washed daliya. Toast 2 min stirring.","Add 3 cups water + salt. Pressure cook 2 whistles (or simmer covered 15 min).","Stir flaxseed powder into each adult's bowl before serving. Serve with Brazil nuts."],"note":"","id":"vegetable_dalia","recipe_label":"Vegetable Dalia"},{"label":"Poha + Eggs","title":"Poha + Peas + Peanuts + Eggs (W3 Sat)","category":"breakfasts","servings":"Family of 4","ingredients":["3 cups thick poha (flattened rice)","½ cup green peas","½ cup roasted peanuts","1 tsp mustard seeds","8–10 curry leaves","1 green chilli (skip for kids)","½ tsp turmeric","Lemon juice + fresh coriander","Hemp seeds (1 tsp per adult)","2 eggs per adult, 1 per child (boiled)","Side: sliced cucumber + carrot sticks"],"steps":["Rinse poha in water 30 sec, drain. It should be just soft — not mushy.","Heat oil. Splutter mustard seeds + curry leaves + chilli.","Add peas + peanuts + turmeric. Stir 2 min.","Add drained poha + salt. Toss gently 3–4 min.","Finish with lemon juice + coriander + hemp seeds.","Boil eggs 10 min separately. Serve 2 per adult alongside poha + veg side + nuts."],"note":"","id":"poha_eggs","recipe_label":"Poha + Eggs"},{"label":"Scrambled Eggs + Beet Leaves","title":"Creamy Scrambled Eggs + Beet Leaves (W3 Fri)","category":"breakfasts","servings":"Family of 4","ingredients":["2 eggs per adult","Splash of milk or cream","1 cup beet leaves, roughly chopped","4–5 mushrooms per adult, sliced","1 tsp ghee","Salt + pepper","Hemp seeds + flaxseed powder","Seeded toast + side: sliced tomato + cucumber"],"steps":["Heat ghee in pan. Add mushrooms, cook 4 min until golden.","Add beet leaves, wilt 2 min.","Whisk eggs with milk/cream + salt. Pour into pan.","Stir slowly on medium-low heat until just set — keep creamy.","Finish with hemp seeds + flaxseed powder. Serve with seeded toast + veg side."],"note":"","id":"scrambled_eggs_beet_leaves","recipe_label":"Scrambled Eggs + Beet Leaves"},{"label":"Thai Green Vegetable Curry","title":"Thai Green Veg Curry + Jasmine Rice","category":"lunches","servings":"Family of 4","ingredients":["2 tbsp Thai green curry paste","400ml coconut milk","1 cup broccoli florets","1 zucchini, sliced","1 bell pepper, sliced","200g firm tofu, cubed","1 cup veg stock","2 cloves garlic + thumb ginger","Kaffir lime leaves (optional)","Jasmine rice (1 cup dry) to serve","1 tsp pumpkin seed powder + ½ tsp flaxseed powder per adult"],"steps":["Heat oil in wok. Sauté garlic + ginger 1 min.","Add curry paste, cook 2 min until fragrant.","Add coconut milk + stock. Bring to simmer.","Add tofu + broccoli + zucchini + bell pepper. Simmer 12 min.","Season with lime juice + salt. Stir in pumpkin seed powder.","Serve over jasmine rice with flaxseed powder on rice."],"note":"","id":"thai_green_vegetable_curry","recipe_label":"Thai Green Vegetable Curry"},{"label":"Rajma Rice","title":"Rajma + Brown Rice","category":"lunches","servings":"Family of 4","ingredients":["2 cups kidney beans, soaked overnight (or batch from Saturday)","2 onions, finely diced","3 tomatoes, pureed","2 tsp rajma masala","1 tsp cumin + ½ tsp turmeric","Pumpkin seed powder (1 tsp per adult)","Brown rice to serve","Side: sautéed zucchini + capsicum","Raita to serve"],"steps":["Pressure cook soaked rajma 15–20 min (or 3 whistles). Batch cook Saturday.","Sauté onion in ghee 8 min until golden. Add garlic-ginger paste 2 min.","Add tomato purée + spices. Cook 10 min until oil separates.","Add cooked rajma + water. Simmer 10 min. Mash a few beans for creaminess.","Stir in pumpkin seed powder. Serve with brown rice + veg side + raita."],"note":"Batch cook Saturday. Rajma keeps 4–5 days. Reheat Monday (W1 & W3).","id":"rajma_rice","recipe_label":"Rajma Rice"},{"label":"Smoky Baingan Bharta","title":"Smoky Baingan-Chana Bharta + Quinoa","category":"lunches","servings":"Family of 4","ingredients":["2 large eggplants (baingan)","1 tin chickpeas (chana), drained","2 onions, finely diced","3 tomatoes, diced","1 tsp cumin + 1 tsp coriander","½ tsp smoked paprika","Flaxseed powder (1 tsp per adult)","Quinoa to serve + steamed broccoli","Palak raita to serve"],"steps":["Char eggplants directly over gas flame 15–20 min, turning, until completely soft. Or use oven broiler.","Cool in a bowl covered. Peel carefully — keep all the smoky juices.","Mash eggplant roughly. Sauté onion 8 min, add garlic-ginger, cook 2 min.","Add tomato + spices. Cook 8 min. Add mashed eggplant + chickpeas. Cook 10 min.","Stir in flaxseed powder. Serve with quinoa + steamed broccoli + palak raita."],"note":"","id":"smoky_baingan_bharta","recipe_label":"Smoky Baingan Bharta"},{"label":"Lobiya & Gobi Bhurji","title":"Lobiya Curry + Gobi Bhurji + Brown Rice","category":"lunches","servings":"Family of 4","ingredients":["1½ cups black-eyed peas (lobiya), soaked","½ head cauliflower, finely crumbled","2 onions + 3 tomatoes","1 tsp cumin + ½ tsp turmeric + 1 tsp coriander","Pumpkin seed powder (1 tsp per adult)","Brown rice to serve","Side: sautéed spinach + onion","Plain दही"],"steps":["Lobiya: pressure cook 3 whistles. Make tomato-onion gravy, add lobiya + spices. Simmer 10 min.","Gobi Bhurji: crumble cauliflower to coarse rubble. Sauté onion 5 min, add cauliflower + turmeric + coriander + salt. Cook 10 min.","Sauté spinach + onion in ghee 4 min for the side.","Stir pumpkin seed powder into lobiya curry.","Serve lobiya + gobi bhurji + brown rice + spinach side + दही."],"note":"","id":"lobiya_gobi_bhurji","recipe_label":"Lobiya & Gobi Bhurji"},{"label":"Brown Rice & Chole","title":"Brown Rice + Chole","category":"lunches","servings":"Family of 4","ingredients":["2 cups chickpeas, soaked overnight (or canned)","2 onions + 3 tomatoes","1½ tsp chole masala + 1 tsp cumin","Hemp seeds + sunflower seed powder","Brown rice to serve","Side: sautéed spinach + onion","Cucumber raita"],"steps":["Pressure cook soaked chickpeas 20 min (or use canned). Batch can be made Saturday.","Deep-fry / dry-roast 1 tbsp onion for garnish.","Make dark masala base: cook onion 10 min until very brown. Add tomato + chole masala.","Add chickpeas + water. Simmer 15 min. Add amchur or lemon.","Sprinkle hemp seeds + sunflower seed powder. Serve with brown rice + spinach side + raita."],"note":"","id":"brown_rice_chole","recipe_label":"Brown Rice & Chole"},{"label":"Methi Dal","title":"Methi Dal + Brown Rice + Okra","category":"lunches","servings":"Family of 4","ingredients":["1½ cups toor dal","1 large bunch fresh methi (fenugreek) leaves","1 onion + 2 tomatoes","1 tsp cumin + ½ tsp turmeric","Flaxseed powder (1 tsp per adult)","Brown rice to serve","Side: stir-fried okra + steamed carrot","Plain दही"],"steps":["Pressure cook toor dal with turmeric 3 whistles. Mash lightly.","Temper: ghee + cumin + onion 6 min + tomato 5 min.","Add methi leaves, wilt 3 min. Add cooked dal, simmer 8 min.","Stir-fried okra: sauté bhindi with cumin + amchur 10 min until crisp.","Stir flaxseed powder into dal. Serve with brown rice + okra + carrot + दही."],"note":"","id":"methi_dal","recipe_label":"Methi Dal"},{"label":"Quinoa Amaranth Khichdi","title":"Quinoa & Amaranth Khichdi + Roasted Beetroot","category":"lunches","servings":"Family of 4","ingredients":["¾ cup quinoa + ¼ cup amaranth","½ cup split yellow moong dal","1 tsp cumin + ½ tsp turmeric + ½ tsp ginger","Pumpkin seed powder (1 tsp per adult)","2–3 beetroots, diced (roast or from batch)","Side: sautéed zucchini + capsicum","Plain दही"],"steps":["Rinse quinoa + amaranth + moong dal together.","Pressure cook with 3 cups water + cumin + turmeric + ginger + salt (2 whistles).","Roast beetroot cubes at 200°C 20 min (or use Saturday batch).","Sauté zucchini + capsicum in ghee 5 min.","Stir pumpkin seed powder into khichdi. Serve with roasted beet + veg side + दही."],"note":"","id":"quinoa_amaranth_khichdi","recipe_label":"Quinoa Amaranth Khichdi"},{"label":"Quinoa Moong Dal Khichdi","title":"Quinoa & Moong Dal Khichdi + Roasted Pumpkin","category":"lunches","servings":"Family of 4","ingredients":["1 cup quinoa + ½ cup moong dal","1 tsp cumin + ½ tsp turmeric","Pumpkin seed powder (1 tsp per adult)","2 cups butternut pumpkin, cubed","Side: sautéed spinach + onion","Palak raita"],"steps":["Rinse quinoa + moong dal. Pressure cook with 3 cups water + spices (2 whistles).","Roast pumpkin cubes at 200°C 20 min until golden.","Sauté spinach + onion in ghee 4 min.","Stir pumpkin seed powder into khichdi.","Serve khichdi + roasted pumpkin + spinach side + palak raita."],"note":"","id":"quinoa_moong_dal_khichdi","recipe_label":"Quinoa Moong Dal Khichdi"},{"label":"Lauki Sabzi + Toor Dal","title":"Lauki Sabzi + Toor Dal + Roti","category":"lunches","servings":"Family of 4","ingredients":["1 large lauki (bottle gourd), peeled + diced","1½ cups toor dal","1 onion + 1 tsp cumin + ½ tsp turmeric","Hemp seeds + pumpkin seed powder","Roti (from dough batch)","Side: sautéed capsicum + cherry tomatoes","Cucumber raita"],"steps":["Toor dal: pressure cook 3 whistles. Add tadka (ghee + mustard + curry leaves + chilli).","Lauki sabzi: heat ghee, cumin. Add onion 4 min. Add diced lauki + turmeric + coriander + salt.","Cover + cook on medium 15 min until lauki is completely tender.","Sauté capsicum + cherry tomatoes 5 min.","Sprinkle hemp seeds + pumpkin seed powder on dal. Serve with roti + raita."],"note":"","id":"lauki_sabzi_toor_dal","recipe_label":"Lauki Sabzi + Toor Dal"},{"label":"Rajma Bhindi","title":"Rajma + Bhindi Sabzi + Brown Rice","category":"lunches","servings":"Family of 4","ingredients":["2 cups cooked rajma (from Saturday batch)","300g okra (bhindi), sliced","1 onion + 2 tomatoes + spices","1 tsp amchur (dry mango powder)","Pumpkin seed powder","Brown rice + steamed broccoli","Plain दही"],"steps":["Reheat rajma from Saturday batch 8 min.","Bhindi sabzi: heat oil in wide pan. Add okra in single layer, cook undisturbed 4 min.","Add onion + cumin + coriander + amchur + salt. Stir and cook 6 more min.","Steam broccoli 8 min until very soft.","Stir pumpkin seed powder into rajma. Serve with brown rice + bhindi + broccoli + दही."],"note":"","id":"rajma_bhindi","recipe_label":"Rajma Bhindi"},{"label":"Palak Dal","title":"Palak Dal + Brown Rice","category":"lunches","servings":"Family of 4","ingredients":["1½ cups toor dal","2 cups fresh spinach leaves","1 onion + 3 cloves garlic + 2 tomatoes","1 tsp mustard seeds + 1 dried red chilli","Pumpkin seed powder (1 tsp per adult)","Brown rice to serve","Side: sautéed zucchini + capsicum","Pudina raita"],"steps":["Pressure cook toor dal with spinach + turmeric 3 whistles.","Tadka: heat ghee + mustard seeds until they pop. Add garlic until golden.","Add onion 5 min. Add tomato + spices, cook 8 min.","Add cooked dal + spinach mix. Stir well, simmer 5 min.","Sauté zucchini + capsicum 5 min. Stir pumpkin seed powder into dal.","Serve with brown rice + veg side + pudina raita."],"note":"","id":"palak_dal","recipe_label":"Palak Dal"},{"label":"Paneer do Pyaza","title":"Paneer do Pyaza (W3 Tue)","category":"lunches","servings":"Family of 4","ingredients":["400g paneer, cubed","4 onions total (2 for masala, 2 for do-pyaza finish)","3 tomatoes, pureed","1 tsp each: cumin, coriander, garam masala","½ tsp kashmiri chilli","2 tbsp ghee","Hemp seeds + flaxseed powder","Roti to serve","Side: steamed broccoli + carrot","Palak raita"],"steps":["First onion: heat ghee, cook 2 diced onions very slowly 15 min until deep golden. Set aside half.","In same pan, add tomato purée + all spices. Cook 10 min until thick.","Add paneer cubes, fold gently. Simmer 5 min.","Do-pyaza finish: add reserved caramelised onion + quarter the remaining 2 onions into petals. Stir through.","Steam broccoli + carrot 8 min. Stir hemp seeds + flaxseed powder into curry.","Serve with roti + veg side + palak raita."],"note":"'Do pyaza' means double onion — the key is caramelising the first batch very deeply.\n🧀 Paneer: homemade. Use 400g from W3 Saturday batch — make ~750g Sat, store in cold water in fridge.","id":"paneer_do_pyaza","recipe_label":"Paneer do Pyaza"},{"label":"Stuffed Capsicum Curry","title":"Stuffed Capsicum Curry + Brown Rice","category":"lunches","servings":"Family of 4","ingredients":["6 medium capsicums (halved, deseeded)","250g paneer, crumbled","3 tbsp besan (chickpea flour)","1 tsp cumin + ½ tsp coriander + ½ tsp garam masala","2 onions + 3 tomatoes (for gravy)","Hemp seeds + sunflower seed powder","Brown rice to serve","Side: steamed broccoli + carrot","Cucumber raita"],"steps":["Filling: mix crumbled paneer + besan + cumin + coriander + garam masala + salt.","Stuff capsicum halves firmly with paneer filling.","Gravy: sauté onion 8 min, add garlic-ginger, tomato + spices. Cook 10 min.","Place stuffed capsicums in gravy, cover and simmer 20 min until capsicum softens.","Steam broccoli + carrot 8 min. Sprinkle hemp seeds + sunflower seed powder on rice.","Serve 2 stuffed capsicums per adult with brown rice + veg side + raita."],"note":"🧀 Paneer: homemade. Use 250g from W3 Thursday batch (make ~450g Thu, also covers Fri toasties).","id":"stuffed_capsicum_curry","recipe_label":"Stuffed Capsicum Curry"},{"label":"Paneer Tofu Kofta Curry","title":"Paneer & Tofu Kofta Curry + Brown Rice","category":"lunches","servings":"Family of 4","ingredients":["200g paneer, grated","200g firm tofu, well-drained + crumbled","3 tbsp besan","1 tsp each: cumin, coriander, garam masala","2 onions + 3 tomatoes + 2 tbsp cream (gravy)","Flaxseed powder + sunflower seed powder","Brown rice to serve","Side: steamed asparagus + roasted capsicum"],"steps":["Koftas: mix paneer + tofu + besan + spices + salt. Shape into balls (golf-ball size).","Pan-fry koftas in 1 tbsp oil, turning, 8–10 min until golden. Or bake 200°C 20 min.","Gravy: cook onion 8 min, add garlic-ginger, tomato + spices. Cook 12 min. Add cream.","Add koftas to gravy. Simmer gently 5 min.","Steam asparagus 6 min. Roast capsicum strips 10 min.","Stir flaxseed powder into curry. Serve with brown rice + veg side."],"note":"","id":"paneer_tofu_kofta_curry","recipe_label":"Paneer Tofu Kofta Curry"},{"label":"Kerala Vegetable Stew","title":"Kerala-style Vegetable Stew + Rice","category":"lunches","servings":"Family of 4","ingredients":["2 potatoes, diced","1 cup green beans, cut","2 carrots, diced","400ml coconut milk","2 green chillies, slit (skip for kids)","10 curry leaves","1 small onion + 1 tsp ginger","1 tsp pumpkin seed powder + flaxseed powder per adult","Brown rice or appam to serve","Plain दही"],"steps":["Heat coconut oil. Sauté onion + ginger + green chilli + curry leaves 5 min.","Add potato + carrot + beans. Stir 2 min.","Add coconut milk + ½ cup water. Simmer 15–20 min until veg very tender.","Season with salt + lime juice. Do not boil hard after adding coconut milk.","Stir in pumpkin seed powder + flaxseed powder. Serve with rice + दही."],"note":"Kerala stew is mild and delicate — keep chilli minimal for kids' portion.","id":"kerala_vegetable_stew","recipe_label":"Kerala Vegetable Stew"},{"label":"Paneer Lababdar","title":"Paneer Lababdar (W1 Friday Comfort 🌟)","category":"lunches","servings":"Family of 4","ingredients":["400g paneer, cubed","4 large tomatoes, pureed","2 onions, pureed","2 tbsp cashew paste (soak 10 cashews, blend)","2 tbsp cream","1 tsp each: coriander, cumin, garam masala, kashmiri chilli","1 tsp pumpkin seed powder","Roti + kachumber salad (cucumber + tomato + onion + coriander)","Chef Sanjyot Keer recipe: youtube.com/watch?v=1DbrPChGnpk"],"steps":["Sauté onion purée in ghee 10 min until turns light golden.","Add tomato purée + all spices. Cook 15 min until very thick, oil separates.","Add cashew paste + cream, stir well. Simmer 5 min.","Add paneer cubes. Simmer gently 5 min. Stir in pumpkin seed powder.","Kachumber: chop cucumber + tomato + onion + coriander. Dress with lemon + salt.","Serve lababdar with enriched roti + kachumber."],"note":"🌟 W1 Friday Comfort Night. Rich restaurant-style gravy — worth the effort.\n🧀 Paneer: homemade. Make 400g on Thursday (press 2 hrs), store cubed in cold water. Soak 10 cashews Thu night → blend to paste Friday.","id":"paneer_lababdar","recipe_label":"Paneer Lababdar"},{"label":"Pav Bhaji Khichdi","title":"Pav Bhaji Khichdi (W2 Friday Comfort 🌟)","category":"lunches","servings":"Family of 4","ingredients":["1 cup toor dal + 1 cup rice","1 capsicum + 1 potato + 1 cup cauliflower + 1 cup peas","2 onions + 3 tomatoes","2 tbsp pav bhaji masala","2 tbsp butter","Sunflower seed powder (1 tsp per adult)","Sliced onion + lemon wedges to garnish","Side: cucumber + tomato salad","Chef Sanjyot Keer recipe: youtube.com/watch?v=Fpq8Nwg1UCM"],"steps":["Pressure cook dal + rice + all veg with 4 cups water (3 whistles).","Mash everything roughly — keep some texture.","Sauté onion + tomato in butter 8 min. Add pav bhaji masala, cook 5 min.","Add mashed dal-rice-veg mix. Stir vigorously, simmer 10 min.","Finish with butter. Stir in sunflower seed powder.","Garnish with sliced raw onion + coriander + lemon. Serve with cucumber-tomato salad."],"note":"🌟 W2 Friday Comfort Night. The mashing and masala are what give it the pav bhaji character.","id":"pav_bhaji_khichdi","recipe_label":"Pav Bhaji Khichdi"},{"label":"Cheesy Toasties","title":"Cheesy Toasties 4 Ways + Tomato Soup (W3 Friday Comfort 🌟)","category":"lunches","servings":"Family of 4","ingredients":["8 slices thick bread (or 4 sourdough slices, halved)","Filling 1: grated cheese + sliced onion + chilli flakes","Filling 2: paneer tikka (marinated paneer + spices)","Filling 3: veg pizza style (tomato paste + capsicum + olives + cheese)","Filling 4: masala toast (potato filling + green chutney + cheese)","Tomato soup: 4 tomatoes + 1 onion + garlic + stock + cream","Side salad: cucumber + tomato + lettuce + pumpkin seed powder","Chef Sanjyot Keer recipe: youtube.com/watch?v=E_Px5gvecbI"],"steps":["Tomato soup: sauté onion + garlic 5 min. Add chopped tomatoes + stock. Simmer 15 min. Blend smooth. Add cream + season.","Paneer tikka filling: marinate paneer cubes in yoghurt + tandoori masala 20 min. Pan-fry 8 min.","Masala toast filling: mix mashed potato + chopped coriander + green chutney + chilli.","Assemble all 4 toasties. Grill in sandwich maker 4–5 min each, or griddle pan.","Assemble side salad. Sprinkle pumpkin seed powder on salad.","Kids pasta: cook pasta, toss with butter + cheese + mild tomato sauce."],"note":"🌟 W3 Friday Comfort Night. Make 2 toasties per adult (different fillings). Kids get pasta.\n🧀 Paneer tikka filling: use 200g from W3 Thursday batch. Marinate overnight Thu in yoghurt + tandoori masala.","id":"cheesy_toasties","recipe_label":"Cheesy Toasties"},{"label":"Aloo Palak Methi","title":"Aloo-Palak-Methi Sabzi + Toor Dal + Roti (W1 Fri)","category":"lunches","servings":"Family of 4","ingredients":["3 medium potatoes, diced","2 cups spinach (palak)","1 cup methi (fenugreek) leaves","1 onion + 2 tomatoes + spices","1½ cups toor dal","Flaxseed powder","Roti + plain दही","Side: steamed green beans"],"steps":["Sauté onion 6 min. Add garlic-ginger paste + spices (cumin, coriander, turmeric, amchur).","Add diced potato. Cook 5 min. Add ½ cup water, cover, cook 10 min.","Add spinach + methi. Stir and cook uncovered 5 min.","Toor dal: pressure cook 3 whistles, add tadka.","Steam green beans 8 min. Stir flaxseed powder into dal.","Serve sabzi + dal + roti + green beans + दही."],"note":"","id":"aloo_palak_methi","recipe_label":"Aloo Palak Methi"},{"label":"Aloo Palak Methi + Moong Dal","title":"Aloo-Palak-Methi Sabzi + Moong Dal + Roti (W3 Fri)","category":"lunches","servings":"Family of 4","ingredients":["3 medium potatoes, diced","2 cups spinach + 1 cup methi leaves","1 onion + 2 tomatoes + spices","1½ cups yellow moong dal","Flaxseed powder","Roti + plain दही","Side: steamed green beans"],"steps":["Sabzi: sauté onion + spices. Add potato, cook 10 min. Add spinach + methi, cook 5 min.","Moong dal: wash + pressure cook 2 whistles. Tadka with ghee + cumin + garlic.","Steam green beans 8 min.","Stir flaxseed powder into dal.","Serve with roti + दही. (Kids pasta night — cook one-pot pasta with mild tomato sauce.)"],"note":"","id":"aloo_palak_methi_moong_dal","recipe_label":"Aloo Palak Methi + Moong Dal"},{"label":"Idli + Sambar + Eggs","title":"Idli & Dosa Batter — Master Recipe (All Weeks Enhanced)","category":"foundations","servings":"Family of 4, 3–4 days","ingredients":["── W1 (Idli Rice Base) ──","1½ cups idli rice, soaked 6–8 hrs","½ cup rolled oats (no soak)","½ cup moong dal, soaked 6–8 hrs","1 cup urad dal, soaked 6–8 hrs","½ cup sprouted mung","1 tsp moringa powder + 1 tsp flaxseed powder","Salt | Nutritional yeast post-ferment","","── W2 (Ragi Base) ──","1 cup ragi flour (no soak needed)","½ cup rolled oats (no soak)","½ cup moong dal, soaked 6–8 hrs","1 cup urad dal, soaked 6–8 hrs","½ cup sprouted mung","1 tsp moringa powder + 1 tsp flaxseed powder","Salt | Nutritional yeast post-ferment","","── W3 (Idli Rice + Extra Seeds) ──","1 cup idli rice, soaked 4–6 hrs","½ cup rolled oats (no soak)","½ cup moong dal, soaked 6–8 hrs","1 cup urad dal, soaked 6–8 hrs","½ cup sprouted mung","1½ tsp moringa + 1 tsp pumpkin seed powder + 1 tsp flaxseed powder","Salt | Nutritional yeast post-ferment"],"steps":["SOAK (Friday night each week): urad dal + moong dal 6–8 hrs. Idli rice 4–6 hrs (W1 + W3). Ragi needs no soak (W2). Oats never need soaking.","GRIND (Saturday morning): drain urad dal + moong dal, grind smooth together. Drain rice (W1/W3), grind coarser. Add sprouted mung, blend in. Add ragi flour (W2) or combine rice with urad-moong mix.","Add rolled oats (dry) to blender — brief pulse, slight texture is fine and good.","Stir in moringa + flaxseed powder + pumpkin seed powder (W3) + salt. Consistency: thick, drops slowly from spoon.","FERMENT: W1/W2 — 8–10 hrs. W3 — 10–12 hrs. Loosely covered, warm spot. Oven with light on in cold weather.","Ready when bubbly and risen 30–50%. Refrigerate. Keeps 3–4 days.","FOR IDLI: stir gently, fill moulds ¾ full, steam 10–12 min.","FOR DOSA: thin with water to pouring consistency. Add variation (cumin+onion / tomato+hing / coriander+chilli). Add nutritional yeast JUST before cooking.","⚠️ NEVER add nutritional yeast before or during fermentation — it kills the ferment."],"note":"Nutritional enhancements: oats add beta-glucan (steadier blood sugar, thyroid-friendly) · moong dal boosts protein (~6g extra per serving) + folate + zinc · flaxseed powder: omega-3 ALA + lignans (fermentation makes it safe for hypothyroidism) · sprouted mung: live enzymes, higher iron + zinc bioavailability, vitamin C · moringa: iron, calcium, vitamin K · nutritional yeast (post-ferment only): B12 + complete protein — never add before fermentation","id":"idli_sambar_eggs","recipe_label":"Idli + Sambar + Eggs"},{"label":"Idli + Sambar + Eggs","title":"Sambar Base (Saturday Batch)","category":"foundations","servings":"Family of 4","ingredients":["1½ cups toor dal","2 tomatoes, diced","1 small lemon-size tamarind (soaked in water)","2 tsp sambar powder","½ tsp turmeric","Salt to taste","Fresh tadka each serving: mustard seeds + curry leaves + dried chilli in ghee"],"steps":["Pressure cook toor dal with turmeric 3 whistles. Mash smooth.","Extract tamarind water from soaked tamarind. Add to dal along with tomatoes.","Add sambar powder + salt. Simmer 15 min.","Do NOT add tadka to the batch — it spoils faster.","Refrigerate base up to 5 days. Each serving: heat portion, do fresh tadka (mustard + curry leaves + chilli) in ghee.","Add tadka to individual bowls, not the whole pot."],"note":"Tadka-free base lasts much longer in the fridge. Always do fresh tadka per serving.","id":"idli_sambar_eggs","recipe_label":"Idli + Sambar + Eggs"},{"label":"Rajma Rice","title":"Roti Dough Batches","category":"foundations","servings":"Family of 4","ingredients":["Batch 1 (Saturday): 3½ cups whole wheat atta","Batch 2 (Tuesday): 3 cups whole wheat atta","Batch 3 (Thursday): 2 cups whole wheat atta","Water + pinch salt + 1 tsp oil per batch"],"steps":["Mix atta + salt. Add water gradually until soft, smooth, non-sticky dough.","Knead 5–8 min. Rub surface with oil. Rest 20 min.","Wrap tightly in damp cloth or airtight container. Refrigerate.","Batch 1 covers Sat/Sun/Mon. Batch 2 covers Tue/Wed/Thu. Batch 3 covers Thu/Fri.","To use: bring to room temp 10 min. Roll thin on floured surface. Cook on hot tawa 1–2 min per side."],"note":"","id":"rajma_rice","recipe_label":"Rajma Rice"},{"label":"Quinoa Beet & Kale Bowl","title":"Quinoa + Roasted Beet + Kale Bowl","category":"salads","servings":"Family of 4","ingredients":["¾ cup dry quinoa per adult","3 medium beetroots, diced","2 cups kale, stems removed","1 cucumber, sliced","Cherry tomatoes","Sunflower seeds (whole, 1 tsp) + pumpkin seed powder (1 tsp)","Dressing: 2 tbsp orange juice + 1 tsp cumin + 2 tbsp olive oil + salt"],"steps":["Cook quinoa in 1.5× water 15 min. Fluff, cool slightly.","Roast beetroot cubes at 200°C 20 min (or use Saturday batch).","Massage kale with 1 tsp lemon juice + pinch salt 2 label":"Kale Carrot Egg Salad"},{"label":"Broccoli Spinach Soup","title":"Broccoli-Spinach Soup + Seeded Bread (W3 Sun Eve)","category":"salads","servings":"Family of 4","ingredients":["1 head broccoli, cut into florets","2 cups fresh spinach","1 onion + 3 cloves garlic","500ml vegetable stock","Hemp seeds (1 tsp per adult, stirred in) + flaxseed powder (½ tsp)","Seeded bread to serve","Side: cucumber + cherry tomato salad"],"steps":["Sauté onion + garlic in ghee 5 min until soft.","Add broccoli + stock. Simmer 12 min until broccoli very tender.","Add spinach, stir until wilted 2 min.","Blend smooth. Season with salt + pepper + lemon.","Stir hemp seeds + flaxseed powder into each bowl.","Serve with seeded bread + cucumber-tomato side salad."],"note":"W3 Sunday cosy evening — not a comfort night, just a warming soup.","id":"broccoli_spinach_soup","recipe_label":"Broccoli Spinach Soup"},{"label":"Turai Sabzi + Dal","title":"Turai (Ridge Gourd) Sabzi + Toor Dal + Roti (W3 Wed)","category":"lunches","servings":"Family of 4","ingredients":["2 medium turai (ridge gourd), peeled + diced","1½ cups toor dal","1 onion, finely diced","1 tsp cumin seeds","½ tsp turmeric + ½ tsp coriander powder","Pumpkin seed powder (1 tsp per adult)","Roti (from dough batch) + plain दही","Side: sautéed spinach + onion"],"steps":["Toor dal: pressure cook with turmeric 3 whistles. Add tadka (ghee + mustard seeds + curry leaves + chilli).","Turai sabzi: heat ghee, splutter cumin. Add onion, sauté 4 min.","Add diced turai + turmeric + coriander + salt. Stir well.","Cover and cook on medium 12 min until turai is completely tender (it releases water naturally).","Sauté spinach + onion in ghee 4 min for side.","Stir pumpkin seed powder into dal. Serve turai + dal + roti + spinach side + दही."],"note":"Turai cooks down significantly and becomes silky-soft. Don't add water — it releases its own.","id":"turai_sabzi_dal","recipe_label":"Turai Sabzi + Dal"},{"label":"Banana Pancakes","title":"Saturday Banana Pancakes (Kids AM Snack)","category":"breakfasts","servings":"2 kids (scale up for adults)","ingredients":["2 very ripe bananas","2 eggs","4 tbsp rolled oats (blitzed to flour) or atta","½ tsp cinnamon","Pinch of salt","½ tsp baking powder","Ghee or butter for pan","Yoghurt + fresh fruit to serve"],"steps":["Mash bananas thoroughly in a bowl until smooth.","Beat in 2 eggs. Stir in oat flour + cinnamon + salt + baking powder.","Batter will be thick — that's fine. Add 1 tbsp milk if too stiff.","Heat pan on medium, melt ½ tsp ghee. Pour small circles (~8cm).","Cook 2–3 min until bubbles form and edges set. Flip, cook 1 min.","Serve warm with yoghurt + the week's fresh fruit on the side."],"note":"Made every Saturday as kids' 11 AM snack. Very ripe (spotty) bananas give the best natural sweetness — no added sugar needed. Toddler: plain pancake torn into small pieces.","id":"banana_pancakes","recipe_label":"Banana Pancakes"},{"label":"Banana Bread","title":"Banana Bread / Banana Cake (Thu–Fri bake)","category":"foundations","servings":"1 loaf (8–10 slices)","ingredients":["3 very ripe bananas (brown-spotted — use up the over-ripe ones)","2 eggs","½ cup yoghurt or homemade curd","3 tbsp coconut oil or ghee (melted)","1½ cups whole wheat atta (or half atta + half oat flour)","1 tsp baking soda","½ tsp cinnamon + pinch nutmeg","2 tbsp jaggery or honey (optional — ripe bananas may be sweet enough)","½ cup walnuts or raisins (optional)"],"steps":["Preheat oven to 175°C. Grease and line a loaf tin.","Mash bananas very well. Mix in eggs + yoghurt + melted oil.","Add jaggery/honey if using. Mix wet ingredients smooth.","Fold in atta + baking soda + spices. Do not over-mix — a few lumps are fine.","Fold in walnuts or raisins if using.","Pour into loaf tin. Bake 45–55 min until skewer comes out clean.","Cool 10 min in tin then turn out. Cool completely before slicing.","Store wrapped at room temp 2 days, or refrigerate 5 days."],"note":"Bake Thursday or Friday when bananas from Monday's bunch are very ripe. The loaf keeps well and becomes kids' snack the following week — or slice and freeze. No refined sugar — jaggery optional.","id":"banana_bread","recipe_label":"Banana Bread"}];

// ── SWITCH VIEW ──

let activeShopWeek = 1;
let activeShopTab = 'shop1';
let shopChecked = {};

function switchShopWeek(w) {
  activeShopWeek = w;
  document.getElementById('main').innerHTML = renderShopping();
}

function switchShopTab(tab) {
  activeShopTab = tab;
  document.getElementById('main').innerHTML = renderShopping();
}

function toggleShopItem(key) {
  shopChecked[key] = !shopChecked[key];
  document.getElementById('main').innerHTML = renderShopping();
}

function checkAllShop(shopKey) {
  const weekKey = 'week' + activeShopWeek;
  const shop = SHOPPING_DATA[weekKey][shopKey];
  const prefix = weekKey + '_' + shopKey + '_';
  (shop.sections || []).forEach(sec => {
    sec.items.forEach((item, i) => {
      shopChecked[prefix + sec.name + '_' + i] = true;
    });
  });
  document.getElementById('main').innerHTML = renderShopping();
}

function clearShop(shopKey) {
  const weekKey = 'week' + activeShopWeek;
  const prefix = weekKey + '_' + shopKey + '_';
  Object.keys(shopChecked).filter(k => k.startsWith(prefix)).forEach(k => delete shopChecked[k]);
  document.getElementById('main').innerHTML = renderShopping();
}

function renderShopping() {
  const weekKey = 'week' + activeShopWeek;
  const data = SHOPPING_DATA[weekKey];
  const shopDefs = [
    { key: 'shop1', label: '🛒 Friday — Fresh Produce' },
    { key: 'dry_goods', label: '🏪 Friday — Dry Goods' },
    { key: 'shop2', label: '🛒 Tuesday — Top-Up' },
    { key: 'shop3', label: '🛒 Thursday (Optional)' },
  ];

  function countItems(shopKey) {
    const shop = data[shopKey];
    return (shop.sections || []).reduce((n, s) => n + s.items.length, 0);
  }

  function countChecked(shopKey) {
    const prefix = weekKey + '_' + shopKey + '_';
    return Object.keys(shopChecked).filter(k => k.startsWith(prefix) && shopChecked[k]).length;
  }

  function renderShopPanel(shopKey) {
    const shop = data[shopKey];
    if (!shop || !shop.sections || shop.sections.length === 0) {
      return '<div style="color:rgba(61,43,26,0.4);font-size:14px;padding:20px 0;">No items for this shop this week.</div>';
    }
    const prefix = weekKey + '_' + shopKey + '_';
    const total = countItems(shopKey);
    const checked = countChecked(shopKey);
    const pct = total > 0 ? Math.round(checked/total*100) : 0;
    let html = '';
    if (shop.note) html += '<div class="shop-note">💡 ' + shop.note + '</div>';
    html += '<div class="shop-progress-label">✅ ' + checked + ' / ' + total + ' items (' + pct + '%)</div>';
    html += '<div class="shop-progress-bar"><div class="shop-progress-fill" style="width:' + pct + '%"></div></div>';
    html += '<div class="shop-actions"><button class="shop-btn" onclick="checkAllShop(\'' + shopKey + '\')">✓ Check All</button><button class="shop-btn" onclick="clearShop(\'' + shopKey + '\')">↺ Reset</button></div>';
    shop.sections.forEach(sec => {
      html += '<div class="shop-section"><div class="shop-section-title">' + sec.name + '</div>';
      sec.items.forEach((item, i) => {
        const key = prefix + sec.name + '_' + i;
        const isChecked = shopChecked[key] || false;
        html += '<div class="shop-item ' + (isChecked ? 'checked' : '') + '" onclick="toggleShopItem(\'' + key + '\')">';
        html += '<div class="shop-check">' + (isChecked ? '✓' : '') + '</div>';
        html += '<div style="flex:1"><div class="shop-item-name">' + item.item + '</div>';
        html += '<div class="shop-item-use">' + item.use + '</div></div>';
        html += '<div class="shop-item-qty">' + item.qty + '</div></div>';
      });
      html += '</div>';
    });
    return html;
  }

  let html = '<div class="shopping-view">';
  html += '<div class="shopping-header"><div class="shopping-title">🛒 Shopping Lists</div></div>';
  html += '<div class="shopping-week-selector"><span class="week-label">Week</span>';
  [1,2,3].forEach(w => {
    html += '<button class="shop-week-btn ' + (w === activeShopWeek ? 'active' : '') + '" onclick="switchShopWeek(' + w + ')">Week ' + w + '</button>';
  });
  html += '</div><div class="shop-tabs">';
  shopDefs.forEach(s => {
    const n = countItems(s.key);
    const c = countChecked(s.key);
    const badge = n > 0 ? ' (' + c + '/' + n + ')' : '';
    html += '<button class="shop-tab ' + (s.key === activeShopTab ? 'active' : '') + '" onclick="switchShopTab(\'' + s.key + '\')">' + s.label + badge + '</button>';
  });
  html += '</div>';
  shopDefs.forEach(s => {
    html += '<div class="shop-panel ' + (s.key === activeShopTab ? 'active' : '') + '">';
    html += renderShopPanel(s.key);
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function switchView(v) {
  activeView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  document.getElementById('dayTabs').style.display = (v === 'mealplan') ? 'flex' : 'none';
  if (v === 'mealplan') render();
  else if (v === 'prepguide') renderPrepGuide();
  else if (v === 'shopping') { document.getElementById('main').innerHTML = renderShopping(); }
  else if (v === 'recipes') renderRecipes();
}

function renderPrepGuide() {
  const main = document.getElementById('main');

  function stepHtml(steps) {
    return steps.map((s, i) => {
      const text = typeof s === 'object' ? (s.step || JSON.stringify(s)) : s;
      return `<div class="pg-step"><span class="pg-step-num">${i+1}</span><span class="pg-step-text">${text}</span></div>`;
    }).join('');
  }

  function taskCard(item, trackColor) {
    const border = trackColor === 'passive' ? 'var(--green)' : trackColor === 'active' ? 'var(--saffron)' : 'var(--purple)';
    const usedHtml = (item.usedIn || []).map(u => `<span class="pg-tag uses">${u}</span>`).join('');
    const metaHtml = [
      item.time  ? `<div class="pg-meta-cell"><div class="pg-meta-label">⏱ Time</div><div class="pg-meta-val">${item.time}</div></div>` : '',
      item.keeps ? `<div class="pg-meta-cell"><div class="pg-meta-label">🧊 Keeps</div><div class="pg-meta-val">${item.keeps}</div></div>` : '',
    ].filter(Boolean).join('');
    const id = `pg-item-${item.num}`;
    return `
      <details class="pg-details" id="${id}">
        <summary class="pg-summary" style="border-left:4px solid ${border}">
          <div class="pg-card-num" style="background:${border};color:#fff">${item.num}</div>
          <div class="pg-card-meta">
            <div class="pg-card-title">${item.title}</div>
            <div class="pg-card-subtitle">⏱ ${item.time}</div>
            ${usedHtml ? `<div class="pg-card-tags">${usedHtml}</div>` : ''}
          </div>
          <div class="pg-summary-chevron">⌄</div>
        </summary>
        <div class="pg-details-body">
          ${metaHtml ? `<div class="pg-meta-grid">${metaHtml}</div>` : ''}
          <div class="pg-steps">${stepHtml(item.steps || [])}</div>
          ${item.note ? `<div class="pg-note-box">💡 ${item.note}</div>` : ''}
        </div>
      </details>`;
  }

  // ── Parallel phase block ──────────────────────────────────────
  function phaseHtml(phaseLabel, tracks) {
    const trackCols = tracks.map(([color, label, items]) => {
      const borderCol = color === 'passive' ? 'var(--green)' : color === 'active' ? 'var(--saffron)' : 'var(--purple)';
      const bgCol     = color === 'passive' ? 'rgba(45,106,79,0.07)' : color === 'active' ? 'rgba(232,130,12,0.07)' : 'rgba(123,94,167,0.07)';
      const icon      = color === 'passive' ? '🟢' : color === 'active' ? '🟡' : '🟣';
      const cards     = items.map(item => taskCard(item, color)).join('');
      return `
        <div class="pg-track" style="border:1.5px solid ${borderCol};background:${bgCol};border-radius:14px;padding:16px;flex:1;min-width:260px;">
          <div class="pg-track-label" style="color:${borderCol};font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;">${icon} ${label}</div>
          ${cards}
        </div>`;
    }).join('');
    return `
      <div class="pg-phase" style="margin-bottom:24px;">
        <div class="pg-phase-label" style="font-size:13px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:12px;padding-left:4px;">${phaseLabel}</div>
        <div style="display:flex;flex-wrap:wrap;gap:16px;">${trackCols}</div>
      </div>`;
  }

  function storageHtml(storage) {
    return (storage || []).map(s =>
      `<div class="pg-storage-item"><div class="pg-storage-item-name">${s.item}</div><div class="pg-storage-item-dur">${s.duration}</div></div>`
    ).join('');
  }

  // ── Per-week data ─────────────────────────────────────────────
  const pg = PREP_GUIDE;

  // Saturday parallel phases
  function satPhasesHtml(weekNote, weekSpecial) {
    const phase1 = phaseHtml('⏰ Phase 1 — First 15 min: Start passive tasks immediately', [
      ['passive', 'Start now & walk away (passive)', [
        pg.saturday[1], // Mung sprouting
        pg.saturday[2], // Batter soak
      ]],
      ['active', 'Active — do while phase 1 starts (15 min)', [
        pg.saturday[0], // Seed grinding
      ]],
    ]);
    const phase2 = phaseHtml('🍳 Phase 2 — Main cook session (while batter ferments, ~90 min active)', [
      ['passive', 'Slow & passive — set and forget', [
        pg.saturday[6], // Boiled eggs
        pg.saturday[8], // Grain batches
        pg.saturday[5], // Main curry/stew
        pg.saturday[7], // Beet+carrot steam
      ]],
      ['active', 'Active — hands-on tasks', [
        pg.saturday[4], // Sambar base
        pg.saturday[3], // Besan chilla batter
        pg.saturday[9], // Roti dough
        pg.saturday[10],// Salad dressings
        pg.saturday[11],// Smoothie packs
        pg.saturday[12],// Frittata/special
      ]],
    ]);
    return `
      ${weekNote ? `<div style="background:rgba(232,130,12,0.1);border-left:4px solid var(--saffron);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:14px;line-height:1.6;">${weekNote}</div>` : ''}
      ${weekSpecial ? `<div style="background:rgba(123,94,167,0.1);border-left:4px solid var(--purple);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:14px;">${weekSpecial}</div>` : ''}
      <div style="background:rgba(45,106,79,0.08);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;">
        <strong>🟢 Green = passive</strong> (set it, walk away) &nbsp;·&nbsp;
        <strong>🟡 Yellow = active</strong> (hands-on, needs attention) &nbsp;·&nbsp;
        Expand any card to see detailed steps.
      </div>
      ${phase1}${phase2}`;
  }

  function tuePhasesHtml(weekNote) {
    const cards = pg.tuesday.map(item => taskCard(item, 'active')).join('');
    return `
      ${weekNote ? `<div style="background:rgba(232,130,12,0.1);border-left:4px solid var(--saffron);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:14px;">${weekNote}</div>` : ''}
      <div style="background:rgba(232,130,12,0.07);border:1.5px solid var(--saffron);border-radius:14px;padding:16px;">${cards}</div>`;
  }

  function thuPhasesHtml(weekNote) {
    const cards = pg.thursday.map(item => taskCard(item, 'active')).join('');
    return `
      ${weekNote ? `<div style="background:rgba(232,130,12,0.1);border-left:4px solid var(--saffron);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:14px;">${weekNote}</div>` : ''}
      <div style="background:rgba(232,130,12,0.07);border:1.5px solid var(--saffron);border-radius:14px;padding:16px;">${cards}</div>`;
  }

  // ── Week configs ──────────────────────────────────────────────
  const weeks = [
    {
      num: 1, label: 'Week 1',
      sat_note: '🛒 Shop Friday (produce + dry goods). Soak rajma + batter grains Friday night. Saturday is the big cook — everything should be soaked and ready to go.',
      sat_special: '✅ Frittata (task 13) needed this week — it\'s Monday\'s breakfast.',
      tue_note: 'W1 Tue: Besan chilla batter from fridge (add dill fresh). Lobiya curry for Wed lunch. Roti Dough Batch 2.',
      thu_note: 'W1 Thu: Chole for Thursday lunch. Toor dal for Friday. Comfort night prep: soak cashews tonight for Paneer Lababdar cashew paste.',
    },
    {
      num: 2, label: 'Week 2',
      sat_note: '🛒 Shop Friday (produce + dry goods). Soak moong dal + urad dal Friday night for ragi batter. Saturday big cook. Rajma for end of week — soak Friday night too.',
      sat_special: '⚠️ Frittata (task 13): W2 version — spinach + capsicum + cheese, NO methi. Make it.',
      tue_note: 'W2 Tue: Bake Spinach Egg Muffins fresh (no methi). Quinoa & Amaranth Khichdi base. Roti Dough Batch 2.',
      thu_note: 'W2 Thu: Lauki Sabzi for Thursday lunch. Comfort night: make Pav Bhaji bhaji base tonight, refrigerate.',
    },
    {
      num: 3, label: 'Week 3',
      sat_note: '🛒 Shop Friday (produce + dry goods). W3 batter needs 10–12 hrs — soak grains Friday night. Saturday: Kerala Veg Stew cooked fresh for lunch, big batch cook.',
      sat_special: '⚠️ Frittata (task 13): NOT needed W3. Saturday breakfast is Poha — skip the frittata.',
      tue_note: 'W3 Tue: Paneer do Pyaza base. Ragi roti dough. Roti Dough Batch 2.',
      thu_note: 'W3 Thu: Stuffed Capsicum Curry. Comfort night: prep Cheesy Toasties fillings + kids pasta sauce.',
    },
  ];

  // ── Render ─────────────────────────────────────────────────────
  let html = `
    <div class="pg-header">
      <h2>Weekly Prep Guide</h2>
      <p>Four-day rhythm per week. Friday: shop + 10-min evening soak (passive). Saturday: big anchor cook session (4–5 hrs). Tuesday: top-up shop + cook (90–120 min). Thursday: top-up cook (90–120 min). All other days: zero cooking — just assemble, reheat, dress.</p>
    </div>`;

  // Week tabs
  html += `<div style="display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;">`;
  weeks.forEach((w, i) => {
    html += `<button onclick="document.querySelectorAll('.pg-week-panel').forEach(p=>p.style.display='none');document.querySelectorAll('.pg-week-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');document.getElementById('pg-week-${w.num}').style.display='block';"
      class="pg-week-btn${i===0?' active':''}"
      style="padding:8px 20px;border-radius:20px;border:2px solid var(--saffron);font-weight:700;font-size:14px;cursor:pointer;background:${i===0?'var(--saffron)':'transparent'};color:${i===0?'#fff':'var(--saffron)'};transition:all 0.2s;"
      onmouseover="if(!this.classList.contains('active')){this.style.background='rgba(232,130,12,0.1)'}"
      onmouseout="if(!this.classList.contains('active')){this.style.background='transparent'}"
    >${w.label}</button>`;
  });
  html += `</div>`;

  weeks.forEach((w, i) => {
    html += `<div class="pg-week-panel" id="pg-week-${w.num}" style="display:${i===0?'block':'none'}">`;

    // Saturday
    html += `<div class="pg-section">
      <div class="pg-section-title">🍳 Saturday — Big Cook Session (soaks done last night ✓) <span style="font-weight:400;font-size:14px;color:#888;">(4–5 hours · ${pg.saturday.length} prep tasks)</span></div>
      ${satPhasesHtml(w.sat_note, w.sat_special)}
    </div>`;

    // Tuesday
    html += `<div class="pg-section">
      <div class="pg-section-title">🥄 Tuesday — Top-Up Session <span style="font-weight:400;font-size:14px;color:#888;">(90–120 min + Roti Dough Batch 2)</span></div>
      ${tuePhasesHtml(w.tue_note)}
    </div>`;

    // Thursday
    html += `<div class="pg-section">
      <div class="pg-section-title">🥄 Thursday — Top-Up Session <span style="font-weight:400;font-size:14px;color:#888;">(90–120 min + Roti Dough Batch 3 + comfort night)</span></div>
      ${thuPhasesHtml(w.thu_note)}
    </div>`;

    // Friday night reminder
    html += `<div class="pg-section">
      <div class="pg-section-title">🌙 Friday — Shop + Evening Soak Prep (10 min after shopping)</div>
      <div style="background:rgba(45,106,79,0.08);border:1.5px solid var(--green);border-radius:14px;padding:16px;font-size:14px;line-height:1.8;">
        <div style="font-weight:700;color:var(--green);margin-bottom:8px;">After shopping, takes 10 min to set up soaks:</div>
        <div>🫘 <strong>Soak idli rice:</strong> ${w.num===2?'W2: ragi needs no soak — skip rice soak':'1½ cups idli rice in cold water (W1) / 1 cup idli rice (W3)'}</div>
        <div>🫘 <strong>Soak moong dal + urad dal:</strong> ½ cup moong dal + 1 cup urad dal separately in cold water</div>
        <div>🌱 <strong>Start mung sprouting:</strong> ½ cup whole mung in 2 cups water</div>
        <div>🫘 <strong>Soak rajma</strong> (if needed that week)</div>
        ${w.num===1?'<div>💡 Week 1 starts here — shop this afternoon, soak tonight, big cook tomorrow.</div>':''}
      </div>
    </div>`;

    // Storage table
    html += `<div class="pg-section">
      <div class="pg-section-title">🧊 Storage Reference (all weeks)</div>
      <div class="pg-storage-grid">${storageHtml(pg.storage)}</div>
    </div>`;

    html += `</div>`; // end week panel
  });

  main.innerHTML = html;
}

function togglePgCard(id) {
  const card = document.getElementById(id);
  if (card) card.classList.toggle('open');
}

function expandAllPg(prefix) {
  document.querySelectorAll('[id^="' + prefix + '_"]').forEach(c => c.open = true);
}

function collapseAllPg(prefix) {
  document.querySelectorAll('[id^="' + prefix + '_"]').forEach(c => c.open = false);
}

// Accordion handled by native <details> elements





// ════════════════════════════════════════════════════════════════
// RECIPE BOOK RENDER
// ════════════════════════════════════════════════════════════════


function toggleShopSection(id) {
  openCards[id] = (openCards[id] === false) ? true : false;
  document.getElementById('main').innerHTML = renderShopping();
}

function renderRecipes() {
  const main = document.getElementById('main');
  if (!activeRecipeId && RECIPES.length > 0) activeRecipeId = RECIPES[0].id;

  // Build sidebar
  let sidebarHtml = '';
  RECIPE_CATEGORIES.forEach(cat => {
    const catRecipes = RECIPES.filter(r => r.category === cat.id);
    if (!catRecipes.length) return;
    sidebarHtml += `<div class="rb-sidebar-section">
      <div class="rb-sidebar-heading" style="color:${cat.color}">${cat.label}</div>
      ${catRecipes.map(r => `<button class="rb-sidebar-item ${r.id === activeRecipeId ? 'active' : ''}"
        onclick="selectRecipe('${r.id}')">${r.title}</button>`).join('')}
    </div>`;
  });

  // Build recipe content
  const recipe = RECIPES.find(r => r.id === activeRecipeId);
  const recipeHtml = recipe ? renderRecipeContent(recipe) : '<div class="rb-empty"><div class="rb-empty-icon">📖</div>Select a recipe from the sidebar</div>';

  main.innerHTML = `<div class="rb-wrap">
    <div class="rb-sidebar">${sidebarHtml}</div>
    <div class="rb-content" id="rbContent">${recipeHtml}</div>
  </div>`;
}

function selectRecipe(id) {
  activeRecipeId = id;
  renderRecipes();
  // Scroll content to top
  const el = document.getElementById('rbContent');
  if (el) el.scrollTop = 0;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderRecipeContent(r) {
  const isFoundation = r.category === 'foundations';
  const accentColor = isFoundation ? '#A0390A' : (r.category === 'salads' ? '#0B7A75' : (r.category === 'breakfasts' ? '#7B5EA7' : 'var(--green)'));

  // Helper: normalise a step — handles plain string or {step:...} or {num,title,text,...}
  function stepText(s) {
    if (typeof s === 'string') return s;
    if (s && typeof s === 'object') return s.step || s.text || s.title || JSON.stringify(s);
    return String(s);
  }

  // Helper: normalise an ingredient — handles plain string or object
  function ingText(i) {
    if (typeof i === 'string') return i;
    if (i && typeof i === 'object') return i.item || i.name || i.ingredient || i.text || JSON.stringify(i);
    return String(i);
  }

  let html = `<div class="${isFoundation ? 'rb-foundation' : ''}">`;
  html += `<div class="rb-recipe-title">${r.title}</div>`;
  if (r.subtitle) html += `<div class="rb-recipe-subtitle">${r.subtitle}</div>`;

  // Serves + servings
  html += `<div class="rb-meta-strip">
    <div class="rb-chip"><span>Serves</span>${r.serves || r.servings || '2 adults'}</div>`;
  if (r.category) html += `<div class="rb-chip"><span>Type</span>${r.category}</div>`;
  html += `</div>`;

  // Macros (if present)
  if (r.macros && r.macros.kcal) {
    const m = r.macros;
    html += `<div class="rb-macro-bar">
      <div class="rb-macro-chip"><div class="rb-macro-icon">🔥</div><div class="rb-macro-val">${m.kcal}</div><div class="rb-macro-label">kcal</div></div>
      <div class="rb-macro-chip"><div class="rb-macro-icon">🥩</div><div class="rb-macro-val">${m.protein}g</div><div class="rb-macro-label">protein</div></div>
      <div class="rb-macro-chip"><div class="rb-macro-icon">🌾</div><div class="rb-macro-val">${m.carbs}g</div><div class="rb-macro-label">carbs</div></div>
      <div class="rb-macro-chip"><div class="rb-macro-icon">🫒</div><div class="rb-macro-val">${m.fat}g</div><div class="rb-macro-label">fat</div></div>
      <div class="rb-macro-chip"><div class="rb-macro-icon">🌿</div><div class="rb-macro-val">${m.fiber}g</div><div class="rb-macro-label">fiber</div></div>
    </div>`;
  }

  // ── Ingredients ───────────────────────────────────────────────
  // Support both r.ingredient_groups (grouped) and r.ingredients (flat list)
  html += `<div class="rb-section-label" style="color:${accentColor};border-bottom-color:${accentColor};">Ingredients</div>`;
  if (r.ingredient_groups && r.ingredient_groups.length) {
    r.ingredient_groups.forEach(g => {
      html += `<div class="rb-ingredient-group">`;
      if (g.group) html += `<div class="rb-ig-name">${g.group}</div>`;
      html += `<ul class="rb-ig-list">${(g.items || []).map(i => `<li>${ingText(i)}</li>`).join('')}</ul>`;
      html += `</div>`;
    });
  } else if (r.ingredients && r.ingredients.length) {
    html += `<ul class="rb-ig-list">`;
    r.ingredients.forEach(i => { html += `<li>${ingText(i)}</li>`; });
    html += `</ul>`;
  } else {
    html += `<p style="color:rgba(61,43,26,0.4);font-size:13px;">No ingredients listed.</p>`;
  }

  // ── Steps / Method ────────────────────────────────────────────
  if (r.steps && r.steps.length) {
    html += `<div class="rb-section-label" style="margin-top:20px;">Method</div><div class="rb-steps">`;
    r.steps.forEach((s, idx) => {
      const txt = stepText(s);
      // If s is a rich object with title/text fields use those; otherwise treat whole string as the step
      const title = (s && typeof s === 'object' && s.title) ? s.title : '';
      const body  = (s && typeof s === 'object' && s.text)  ? s.text  : txt;
      html += `<div class="rb-step">
        <div class="rb-step-num">${idx + 1}</div>
        <div class="rb-step-body">
          ${title ? `<div class="rb-step-title">${title}</div>` : ''}
          <div class="rb-step-text">${body}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // ── Note / Serving ideas ──────────────────────────────────────
  const noteText = r.note || '';
  if (noteText) {
    html += `<div class="rb-serving">
      <div class="rb-serving-title">Notes</div>
      <p style="margin:0;font-size:14px;line-height:1.6;">${noteText}</p>
    </div>`;
  }
  if (r.serving_ideas && r.serving_ideas.length) {
    html += `<div class="rb-serving">
      <div class="rb-serving-title">Serving Ideas</div>
      <ul>${r.serving_ideas.map(s => `<li>${typeof s === 'string' ? s : ingText(s)}</li>`).join('')}</ul>
    </div>`;
  }

  html += `</div>`;
  return html;
}

// ── INIT ──
// Auto-select today if possible
const TODAY = new Date().toLocaleDateString('en-US', { weekday: 'long' });
if (DAYS.includes(TODAY)) activeDay = TODAY;

// Auto-open all meal cards on startup
MEAL_DATA.filter(m => m.day === activeDay && m.week === activeWeek).forEach((meal, idx) => {
  const key = `${activeDay}_${idx}`;
  openCards[key] = true;
  activeCardTab[key] = parseSteps(meal.morning).length > 0 ? 'prep' : 'dish';
});

render();
</script>
